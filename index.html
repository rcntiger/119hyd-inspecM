<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<title>소화전 점검 지도</title>
<style>
:root{
  --bg:#0d1117;--sur:#161b22;--sur2:#21262d;--sur3:#2d333b;
  --bd:rgba(255,255,255,.07);--bd2:rgba(255,255,255,.14);
  --tx:#e6edf3;--mt:#7d8590;--ac:#2f81f7;--hi:#ff7b72;--lo:#3fb950;
  --r:8px;--r2:12px;
  /* 공통 ExcelUtil createReader 다크테마 */
  --excel-bg:#161b22;--excel-sur:#21262d;--excel-sur2:#2d333b;
  --excel-tx:#e6edf3;--excel-mt:#7d8590;
  --excel-bd:rgba(255,255,255,.14);--excel-bd2:rgba(255,255,255,.07);
  --excel-ac:#2f81f7;--excel-r:8px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Pretendard','Noto Sans KR',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;overflow-x:hidden}

/* ── 공통 ── */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border:none;border-radius:var(--r);font-size:13px;font-weight:600;cursor:pointer;transition:all .15s}
.btn-primary{background:var(--ac);color:#fff}.btn-primary:hover{filter:brightness(1.15)}
.btn-danger{background:rgba(255,123,114,.12);color:var(--hi);border:1px solid rgba(255,123,114,.25)}.btn-danger:hover{background:rgba(255,123,114,.2)}
.btn-ghost{background:var(--sur2);color:var(--mt);border:1px solid var(--bd2)}.btn-ghost:hover{background:var(--sur3);color:var(--tx)}
input,textarea,select{background:var(--sur2);border:1px solid var(--bd2);color:var(--tx);border-radius:var(--r);font-family:inherit;font-size:13px;outline:none;transition:border-color .15s}
input:focus,textarea:focus,select:focus{border-color:var(--ac)}
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:600}
.toast{position:fixed;bottom:20px;right:20px;background:var(--sur);border:1px solid var(--bd2);border-radius:var(--r);padding:10px 16px;font-size:12px;box-shadow:0 8px 24px rgba(0,0,0,.5);z-index:9999;transform:translateY(60px);opacity:0;transition:all .25s;max-width:300px;pointer-events:none}
.toast.show{transform:translateY(0);opacity:1}
.toast.ok{border-color:var(--lo)}.toast.err{border-color:var(--hi)}

/* ═══ Modal ═══ */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:8000;align-items:center;justify-content:center;padding:16px}
.modal-bg.open{display:flex}
.modal{background:var(--sur);border:1px solid var(--bd2);border-radius:var(--r2);padding:24px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto}
.modal h3{font-size:16px;margin-bottom:16px}
.form-row{margin-bottom:12px}
.form-row label{display:block;font-size:11px;color:var(--mt);font-weight:600;margin-bottom:5px;text-transform:uppercase;letter-spacing:.05em}
.form-row input,.form-row textarea,.form-row select{width:100%;padding:8px 10px}
.form-row textarea{resize:vertical;min-height:60px}

/* ── 홈 뷰 ── */
#homeView{min-height:100vh;display:flex;flex-direction:column}
.home-header{padding:16px 20px;background:var(--sur);border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:12px}
.home-logo{width:36px;height:36px;background:linear-gradient(135deg,#ef4444,#f59e0b);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.home-title{font-size:16px;font-weight:700}
.home-subtitle{font-size:11px;color:var(--mt);margin-top:2px}
.home-content{flex:1;padding:20px;max-width:760px;margin:0 auto;width:100%}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.section-title{font-size:13px;font-weight:700;color:var(--mt);text-transform:uppercase;letter-spacing:.08em}
.project-grid{display:flex;flex-direction:column;gap:10px}
/* 트리 하위 묶음: 왼쪽 가이드선 + 들여쓰기. 접기/펼치기는 display 토글로 처리 */
.tree-children{display:flex;flex-direction:column;gap:8px;margin-left:14px;padding-left:12px;border-left:2px solid rgba(255,255,255,.09)}
.tree-toggle{background:transparent;border:none;color:var(--mt);cursor:pointer;font-size:13px;padding:0 6px 0 0;line-height:1;vertical-align:middle}
.tree-toggle:hover{color:var(--ac)}
.tree-count{font-size:10.5px;color:var(--mt);font-weight:400;margin-left:6px}
/* 눈에 띄는 펼침/접기 버튼: 세분계획이 있다는 것을 명확히 보여준다 */
.tree-expand-btn{display:flex;align-items:center;justify-content:center;gap:6px;width:100%;margin-top:8px;padding:7px 10px;border:1px solid rgba(47,129,247,.35);border-radius:6px;background:rgba(47,129,247,.12);color:var(--ac);font-size:12px;font-weight:700;cursor:pointer;transition:background .15s}
.tree-expand-btn:hover{background:rgba(47,129,247,.25)}
.project-card.subplan.team .tree-expand-btn{border-color:rgba(63,185,80,.35);background:rgba(63,185,80,.12);color:var(--lo)}
.project-card.subplan.team .tree-expand-btn:hover{background:rgba(63,185,80,.25)}
.project-card{background:var(--sur);border:1px solid var(--bd2);border-radius:var(--r2);padding:16px;cursor:pointer;transition:all .15s;position:relative}
.project-card-updown{position:absolute;right:8px;bottom:8px;display:flex;gap:4px}
.project-card-updown button{width:26px;height:22px;border:1px solid var(--bd2);border-radius:5px;background:var(--sur2);color:var(--mt);font-size:11px;cursor:pointer}
.project-card-updown button:hover:not(:disabled){background:var(--ac);color:#fff;border-color:var(--ac)}
.project-card-updown button:disabled{opacity:.3;cursor:default}
.project-card:hover{border-color:var(--ac);background:var(--sur2)}
.project-card-name{font-size:14px;font-weight:700;margin-bottom:4px}
.project-card-desc{font-size:11px;color:var(--mt);margin-bottom:10px;line-height:1.5}
.project-card-meta{display:flex;gap:6px;flex-wrap:wrap}
.project-card-del{position:absolute;top:10px;right:10px;width:24px;height:24px;border-radius:50%;border:none;background:transparent;color:var(--mt);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;opacity:0;transition:opacity .15s}
.project-card:hover .project-card-del{opacity:1}
.project-card-del:hover{background:rgba(255,123,114,.15);color:var(--hi)}
.project-card-edit{position:absolute;top:10px;right:36px;width:24px;height:24px;border-radius:50%;border:none;background:transparent;color:var(--mt);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;opacity:0;transition:opacity .15s}
.project-card:hover .project-card-edit{opacity:1}
.project-card-edit:hover{background:rgba(47,129,247,.15);color:var(--ac)}
/* 세분계획(조별 뷰) 카드: 부모 카드 아래에 들여쓰기된 작은 카드로 표시 */
.project-card.subplan{margin-left:0;padding:10px 14px;border-left:3px solid var(--ac);background:rgba(47,129,247,.04)}
.project-card.subplan.team{border-left-color:var(--lo);background:rgba(63,185,80,.05)}
.project-card.subplan.nested{margin-left:0}
.project-card.subplan .project-card-name{font-size:13px}
.subplan-btn{display:inline-flex;align-items:center;gap:4px;margin-top:8px;padding:4px 10px;border:1px dashed var(--bd2);border-radius:6px;background:transparent;color:var(--mt);font-size:11px;font-weight:600;cursor:pointer;transition:all .15s}
.subplan-btn:hover{border-color:var(--ac);color:var(--ac)}
.empty-state{text-align:center;padding:60px 20px;color:var(--mt)}
.empty-state .big{font-size:48px;margin-bottom:12px}
.empty-state p{font-size:14px;margin-bottom:20px}

/* ── 맵 뷰 ── */

/* ═══ Map / Layout ═══ */
#mapView{display:none;height:100vh;height:100dvh;flex-direction:column}
.map-header{padding:8px 14px;background:var(--sur);border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:10px;flex-shrink:0;min-height:44px}
.map-header-row1,.map-header-row2{display:contents}
.map-header::-webkit-scrollbar{display:none}
.map-header .back-btn{padding:4px 10px;border:1px solid #2563eb;border-radius:6px;background:#2563eb;color:#fff;font-size:12px;font-weight:700;cursor:pointer;flex-shrink:0}
.map-header .back-btn:hover{color:var(--tx)}
.map-header-title{font-size:13px;font-weight:700;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.layout{display:flex;flex:1;overflow:hidden;min-height:0}
.sidebar{width:300px;flex-shrink:0;background:var(--sur);border-right:1px solid var(--bd);display:flex;flex-direction:column;overflow:hidden}
.map-wrap{flex:1;position:relative;min-height:0}
#map{width:100%;height:100%}
.panel{padding:10px 12px;border-bottom:1px solid var(--bd)}
.ptitle{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--mt);margin-bottom:7px}
.stats-row{display:flex;gap:4px}
.stat{flex:1;background:var(--sur2);border-radius:6px;padding:6px 4px;text-align:center}
.stat .n{font-size:15px;font-weight:700}
.stat .l{font-size:9px;color:var(--mt);margin-top:1px}
.prog-wrap{height:20px;background:var(--sur2);border-radius:10px;overflow:hidden;margin-top:8px;position:relative}
.prog-fill{height:100%;background:var(--lo);border-radius:10px;transition:width .4s}
.prog-pct-text{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#fff;text-shadow:0 1px 2px rgba(0,0,0,.6);pointer-events:none}
.prog-label{font-size:15px;font-weight:700;color:var(--tx);margin-top:5px;text-align:center}
.fbtn{padding:4px 9px;border-radius:20px;border:1px solid var(--bd2);background:var(--sur2);color:var(--mt);font-size:11px;cursor:pointer;user-select:none;transition:all .12s}
.fbtn.active{color:#fff;border-color:transparent;background:var(--ac)}
.search-wrap input{width:100%;padding:7px 9px}
.list{flex:1;overflow-y:auto;padding:5px}
.list::-webkit-scrollbar{width:3px}
.list::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:3px}
.item{padding:7px 10px;border-radius:var(--r);margin-bottom:3px;cursor:pointer;transition:all .12s;display:flex;align-items:flex-start;gap:7px;border:1px solid transparent}
.item:hover{background:var(--sur2)}.item.active{background:rgba(47,129,247,.1);border-color:rgba(47,129,247,.25)}.item.hidden{display:none}
.item.done-item .iname{color:var(--lo)}
.item.done-item .done-badge{display:inline-flex}
.team-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:4px}
.ibody{flex:1;min-width:0}
.iname{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.isub{font-size:10px;color:var(--mt);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.itags{margin-top:3px;display:flex;gap:3px;flex-wrap:wrap}
.itag{font-size:9px;padding:1px 5px;border-radius:3px;font-weight:600;background:rgba(255,255,255,.06);color:var(--mt)}
.itag.done-tag{background:rgba(63,185,80,.12);color:var(--lo)}
.done-badge{display:none;font-size:9px;padding:1px 6px;border-radius:3px;background:rgba(63,185,80,.12);color:var(--lo);font-weight:600;align-items:center;gap:3px}
@media(max-width:600px){
  .sidebar{width:100%;height:auto;max-height:calc(100dvh - 44px - 48px - 60px);border-right:none;border-bottom:1px solid var(--bd);overflow-y:auto;flex-shrink:0}
  .map-wrap{flex:1;min-height:0;min-width:0}
  #map{width:100%;height:100%;min-height:0}
  .layout{height:100%}
  .sidebar.map-mode{display:none!important}
  .sidebar.map-mode~.map-wrap{height:100%}
  .mob-toggle{display:block!important}
  .map-toolbar{display:none!important}
  .map-toolbar-top{display:none!important}
  .map-header{flex-direction:column;align-items:stretch;overflow-x:visible;overflow-y:visible;gap:5px;padding:6px 8px;min-height:0}
  .map-header-row1,.map-header-row2{display:flex;align-items:center;gap:8px;width:100%}
  .map-header-row1{justify-content:flex-start}
  .map-header-row1>div{margin-left:0}
  .map-header-row2{justify-content:flex-end;flex-wrap:wrap;row-gap:6px}
  .map-header-row2 .btn{flex:0 1 auto;padding:6px 10px!important;font-size:12px!important;font-weight:700!important;text-align:center;white-space:nowrap}
  .map-header-title{display:none}
  .tool-btn .btn-txt{display:inline}
  .tool-btn{padding:6px 8px!important;font-size:11px!important}
  .sidebar.map-mode~.map-wrap .map-toolbar{display:flex!important}
  .sidebar.map-mode~.map-wrap .map-toolbar-top{display:flex!important}
  .insp-row #inspNameGlobal{font-size:12px!important;padding:8px 6px!important}
  .insp-row #inspDateGlobal{font-size:11.5px!important;padding:8px 3px!important}
  .iw-wrap{max-height:64vh!important;max-width:82vw!important;overflow-y:scroll!important;-webkit-overflow-scrolling:touch!important;touch-action:pan-y!important}
  .iw-memo textarea{height:90px!important}
  .iw-photos{grid-template-columns:repeat(3,1fr)!important}
  .dist-info{bottom:64px!important;font-size:11px!important;padding:6px 12px!important}
  .toast{bottom:64px!important;right:50%!important;transform:translate(50%,60px)!important;text-align:center}
  .toast.show{transform:translate(50%,0)!important}
}
.mob-toggle{display:none;position:fixed;bottom:16px;left:50%;transform:translateX(-50%);z-index:9999;background:var(--ac);color:#fff;border:none;border-radius:20px;padding:8px 22px;font-size:13px;font-weight:700;cursor:pointer;box-shadow:0 4px 14px rgba(0,0,0,.5)}

/* 툴바 */
.map-toolbar{position:absolute;top:190px;right:10px;z-index:9999;display:none;flex-direction:column;gap:6px}
.map-toolbar-top{position:absolute;top:10px;left:50%;transform:translateX(-50%);z-index:9999;display:none;flex-direction:row;gap:6px}
.tool-btn{padding:7px 12px;border:1px solid var(--bd2);border-radius:var(--r);font-size:12px;font-weight:600;cursor:pointer;background:var(--sur);color:var(--tx);box-shadow:0 2px 8px rgba(0,0,0,.4);white-space:nowrap}
.tool-btn:hover{background:var(--sur2)}.tool-btn.on{background:var(--ac);color:#fff;border-color:var(--ac)}
.tool-btn.on-sat{background:#7c3aed;color:#fff;border-color:#7c3aed}
.tool-btn.on-rv{background:#22c55e;color:#fff;border-color:#22c55e}

/* 지도 검색 */
.map-search{position:absolute;top:10px;left:10px;z-index:9999;display:none;flex-direction:column;gap:4px;width:240px}
.map-search-row{display:flex;gap:4px}
.map-search input{flex:1;padding:7px 10px;border:1px solid var(--bd2);border-radius:var(--r);font-size:12px;background:var(--sur);color:var(--tx);box-shadow:0 2px 8px rgba(0,0,0,.4)}
.map-search-sbtn{padding:7px 10px;border:1px solid var(--bd2);border-radius:var(--r);background:var(--sur);color:var(--tx);font-size:12px;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.4);white-space:nowrap;font-weight:600}
.map-search-results{background:var(--sur);border:1px solid var(--bd2);border-radius:var(--r);max-height:200px;overflow-y:auto;display:none;box-shadow:0 4px 16px rgba(0,0,0,.5)}
.sri{padding:8px 10px;font-size:11px;cursor:pointer;border-bottom:1px solid var(--bd)}
.sri:last-child{border:none}.sri:hover{background:var(--sur2)}
.sri-name{font-weight:600;margin-bottom:2px}
.sri-addr{color:var(--mt);font-size:10px}

/* 거리재기 */
.dist-info{position:absolute;bottom:30px;left:50%;transform:translateX(-50%);background:var(--sur);border:1px solid var(--bd2);border-radius:var(--r);padding:8px 16px;font-size:12px;z-index:9999;display:none;box-shadow:0 4px 12px rgba(0,0,0,.5);text-align:center;white-space:nowrap}
.dist-info span{color:var(--ac);font-weight:700;font-size:14px}

/* 로드뷰 */
.rv-panel{position:absolute;inset:0;z-index:200;display:none;flex-direction:column}
.rv-header{background:var(--sur);border-bottom:1px solid var(--bd);padding:8px 14px;display:flex;align-items:center;gap:8px;flex-shrink:0}
.rv-body{flex:1;position:relative;min-height:0}
#rvMap{width:100%;height:100%}
.rv-minimap{position:absolute;bottom:12px;right:12px;width:180px;height:140px;border-radius:8px;overflow:hidden;border:2px solid rgba(255,255,255,.8);box-shadow:0 4px 12px rgba(0,0,0,.5);z-index:300;display:none}

/* 마커 */

/* ═══ Marker ═══ */
.kk-marker{width:22px;height:22px;border-radius:50%;border:2px solid #fff;box-shadow:0 2px 5px rgba(0,0,0,.6);cursor:pointer;transition:all .2s;background:#ef4444;display:flex;align-items:center;justify-content:center}
.kk-marker:hover{transform:scale(1.8)}
/* 마커 툴팁 */
.mk-tooltip{position:fixed;background:rgba(15,23,42,.92);color:#f1f5f9;font-size:15px;font-weight:600;padding:8px 16px;border-radius:10px;white-space:nowrap;pointer-events:none;box-shadow:0 2px 8px rgba(0,0,0,.5);z-index:9999;opacity:0;transition:opacity .15s;transform:translateX(-50%)}
.mk-tooltip::after{content:'';position:absolute;bottom:100%;left:50%;transform:translateX(-50%);border:4px solid transparent;border-bottom-color:rgba(15,23,42,.92)}
.kk-marker.done{background:#22c55e!important;width:14px!important;height:14px!important;box-shadow:0 2px 8px rgba(34,197,94,.6)!important}
.kk-marker.active-mk{width:28px!important;height:28px!important;border:3px solid #fff!important;box-shadow:0 0 0 3px rgba(255,255,255,.5),0 3px 10px rgba(0,0,0,.7)!important}
.kk-marker.g1{background:#3b82f6}.kk-marker.g2{background:#ef4444}.kk-marker.g3{background:#a78bfa}.kk-marker.g4{background:#06b6d4}.kk-marker.g5{background:#10b981}.kk-marker.g6{background:#ec4899}.kk-marker.g0{background:#7d8590}

/* 팝업 */

/* ═══ InfoWindow ═══ */
.iw-wrap{background:#fff;border-radius:10px;padding:12px 14px;min-width:260px;max-width:320px;box-shadow:0 4px 20px rgba(0,0,0,.25);font-family:sans-serif;max-height:60vh;overflow-y:auto;position:relative;z-index:10001}
.iw-photo-add-top{display:block}
.iw-photo-add-bottom{display:none!important}
@media(max-width:600px){
  .iw-photo-add-top{display:block}
  .iw-photo-add-bottom{display:none!important}
  .hy-section{margin-bottom:7px}
  .hy-tbtn{padding:6px 5px;font-size:10px}
  .hy-status-badge{margin:1px 0 6px}
  .hy-label{margin-bottom:3px}
}
.iw-done-top{display:block;padding:3px 9px;border:none;border-radius:5px;font-size:10px;font-weight:700;cursor:pointer;background:#f1f5f9;color:#64748b;transition:all .15s}
.iw-done-top.is-done{background:#22c55e;color:#fff}
.iw-done-bottom,.iw-done-bottom-divider{display:none!important}
.iw-wrap::-webkit-scrollbar{width:3px}
.iw-wrap::-webkit-scrollbar-thumb{background:#e2e8f0;border-radius:3px}
.iw-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.iw-team-badge{font-size:9px;font-weight:700;padding:2px 8px;border-radius:10px}
.iw-team-badge.done{background:rgba(34,197,94,.15)!important;color:#22c55e!important}
.iw-close{cursor:pointer;color:#94a3b8;font-size:18px;line-height:1;padding:2px 4px}
.iw-name{font-size:14px;font-weight:700;color:#0f172a;margin-bottom:4px}
.iw-addr-row{display:flex;align-items:center;gap:6px;margin-bottom:3px}
.iw-addr{font-size:12px;color:#64748b;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:700}
.iw-rv-inline{flex-shrink:0;padding:2px 7px;border:1px solid #e2e8f0;border-radius:5px;background:#f8fafc;color:#475569;font-size:10px;font-weight:600;cursor:pointer;white-space:nowrap;transition:all .15s}
.hy-fixloc-btn{flex:1;padding:6px 4px;border:1px dashed #93c5fd;border-radius:7px;background:#eff6ff;color:#2563eb;font-size:10.5px;font-weight:700;cursor:pointer;white-space:nowrap}
.hy-fixloc-full{width:100%;display:block;margin-bottom:8px;font-size:11px;white-space:normal}
.hy-fixloc-mini{min-width:200px;text-align:center}
.hy-fixloc-mini-title{font-size:13px;font-weight:800;color:#0f172a;margin-bottom:4px}
.hy-fixloc-mini-hint{font-size:11px;color:#64748b;margin-bottom:10px}
.hy-fixloc-btn.on{background:#2563eb;color:#fff;border-style:solid;animation:hy-pulse 1s infinite}
@keyframes hy-pulse{0%,100%{opacity:1}50%{opacity:.6}}
.hy-locbtn-row{display:flex;gap:6px;margin-bottom:8px}
.iw-latlng-row{font-size:10px;color:#94a3b8;margin-bottom:6px}
.iw-locfixed-badge{display:inline-block;background:#dbeafe;color:#2563eb;font-weight:700;padding:1px 6px;border-radius:8px;font-size:9.5px;margin-left:2px}
.iw-rv-inline:hover{background:#22c55e;color:#fff;border-color:#22c55e}
.iw-extra{font-size:10px;color:#3b82f6;margin-bottom:10px;font-weight:600}
.iw-divider{height:1px;background:#f1f5f9;margin:4px 0}
.iw-btn{width:100%;padding:8px;border:none;border-radius:7px;font-size:12px;font-weight:700;cursor:pointer;transition:all .15s}
.iw-btn.done-btn{background:#f1f5f9;color:#64748b}.iw-btn.done-btn.is-done{background:#22c55e;color:#fff}
.iw-date-row{display:flex;align-items:center;gap:5px;margin-top:5px}
.iw-date-row label{font-size:10px;color:#22c55e;font-weight:600;white-space:nowrap}
.iw-date-row input{flex:1;padding:4px 7px;border:1px solid #bbf7d0;border-radius:5px;font-size:11px;color:#15803d;background:#f0fdf4}
.iw-memo-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
.iw-memo-title{font-size:10px;color:#94a3b8;font-weight:600}
.iw-memo-status{font-size:9px;color:#94a3b8}
.iw-memo textarea{width:100%;height:90px;border:1px solid #e2e8f0;border-radius:6px;padding:6px 8px;font-size:11px;resize:vertical;outline:none;font-family:sans-serif;color:#334155;background:#f8fafc;box-sizing:border-box}
.iw-memo textarea:focus{border-color:#3b82f6}
.iw-memo-actions{display:flex;align-items:center;justify-content:space-between;margin-top:4px}
.iw-memo-len{font-size:9px;color:#cbd5e1}
.iw-memo-btns{display:flex;gap:4px}
.iw-memo-save{padding:3px 8px;border:1px solid #bfdbfe;border-radius:4px;font-size:10px;cursor:pointer;background:#eff6ff;color:#1d4ed8;font-weight:600}
.iw-memo-del{padding:3px 8px;border:1px solid #fecaca;border-radius:4px;font-size:10px;cursor:pointer;background:#fef2f2;color:#dc2626;font-weight:600}

/* 사진 */
.iw-photos{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;margin-top:6px}
.iw-photo-thumb{aspect-ratio:1;border-radius:5px;overflow:hidden;cursor:pointer;position:relative;background:#f1f5f9}
.iw-photo-thumb img{width:100%;height:100%;object-fit:cover}
.iw-photo-del{position:absolute;top:2px;right:2px;width:18px;height:18px;border-radius:50%;background:rgba(0,0,0,.6);color:#fff;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:10px;opacity:0;transition:opacity .15s}
.iw-photo-thumb:hover .iw-photo-del{opacity:1}
.iw-photo-add{height:36px;border-radius:5px;border:1.5px dashed #e2e8f0;display:flex;flex-direction:row;align-items:center;justify-content:center;cursor:pointer;font-size:11px;color:#94a3b8;gap:5px;transition:all .15s;padding:0 10px}
.iw-photos:has(.iw-photo-thumb) .iw-photo-add{aspect-ratio:1;height:auto;padding:0;flex-direction:column;font-size:9px;gap:1px}
.iw-photo-add:hover{border-color:#3b82f6;color:#3b82f6;background:#f0f9ff}
.iw-photo-add span:first-child{font-size:14px}
/* ── 소화전 점검 입력 카드 ── */
.hy-status-badge{display:inline-block;font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px;margin:2px 0 8px}
.hy-section{margin-bottom:10px}
.hy-collapsible-row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:2px}
.hy-collapsible{margin-bottom:8px;flex:1 1 calc(50% - 4px);min-width:0}
.hy-collapsible.open{flex:1 1 100%}
.hy-collapse-btn{width:100%;display:flex;flex-direction:column;align-items:flex-start;gap:2px;padding:8px 10px;border:1.5px solid #e2e8f0;border-radius:8px;background:#f8fafc;color:#334155;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;box-sizing:border-box}
.hy-collapse-btn.open{border-color:#2563eb;background:#eff6ff;border-bottom-left-radius:0;border-bottom-right-radius:0;flex-direction:row;align-items:center;justify-content:space-between}
.hy-collapse-val{color:#2563eb;font-weight:800;font-size:11px}
.hy-collapse-body{border:1.5px solid #2563eb;border-top:none;border-bottom-left-radius:8px;border-bottom-right-radius:8px;padding:10px 12px;background:#fff}
.hy-label{font-size:10px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:.03em;margin-bottom:5px}
.hy-req{color:#ef4444;font-size:9px;text-transform:none}
.hy-toggle-row{display:flex;gap:5px;flex-wrap:wrap}
.hy-grade-row{flex-wrap:nowrap}
.hy-grade-row .hy-tbtn{flex:1 1 0;min-width:0;padding:8px 2px;font-size:13px}
.hy-tbtn{flex:1;min-width:64px;padding:7px 6px;border:1.5px solid #e2e8f0;border-radius:7px;background:#f8fafc;color:#475569;font-size:11px;font-weight:700;cursor:pointer;transition:all .12s;font-family:inherit}
.hy-tbtn:hover{border-color:#94a3b8}
.hy-tbtn.on{background:#2563eb;border-color:#2563eb;color:#fff}
.hy-tbtn.hy-good.on{background:#16a34a;border-color:#16a34a}
.hy-tbtn.hy-warn.on{background:#d97706;border-color:#d97706}
.hy-tbtn.hy-bad.on{background:#dc2626;border-color:#dc2626}
.hy-select{width:100%;padding:7px 9px;border:1.5px solid #e2e8f0;border-radius:7px;font-size:11px;color:#334155;background:#f8fafc;outline:none;font-family:inherit}
.hy-defect{width:100%;margin-top:7px;min-height:60px;padding:7px 9px;border:1.5px solid #fecaca;border-radius:7px;font-size:11px;color:#334155;background:#fef2f2;outline:none;resize:vertical;font-family:inherit;box-sizing:border-box}
.hy-saved-info{font-size:10px;color:#94a3b8;text-align:center;margin-top:5px}

.iw-rv-btn{width:100%;padding:6px;border:1px solid #e2e8f0;border-radius:6px;font-size:11px;cursor:pointer;background:#f8fafc;color:#334155;margin-bottom:4px}

/* 전체화면 사진 뷰어 */
.photo-viewer{display:none;position:fixed;inset:0;background:rgba(0,0,0,.95);z-index:9999;align-items:center;justify-content:center;flex-direction:column}
.photo-viewer.open{display:flex}
.photo-viewer img{max-width:95vw;max-height:85vh;object-fit:contain;border-radius:8px}
.photo-viewer-close{position:absolute;top:16px;right:20px;color:#fff;font-size:28px;cursor:pointer;opacity:.7}
.photo-viewer-close:hover{opacity:1}
.photo-viewer-caption{color:#94a3b8;font-size:13px;margin-top:10px}

/* 다이얼로그 */
#diagPanel{display:none;position:absolute;inset:0;background:rgba(13,17,23,.95);align-items:center;justify-content:center;flex-direction:column;padding:24px;z-index:9999}
.diag-box{background:var(--sur);border:1px solid rgba(255,123,114,.3);border-radius:14px;padding:24px 28px;max-width:440px;width:100%}

/* pgWrap */
.pgwrap{height:3px;background:var(--sur2);border-radius:2px;overflow:hidden;margin-top:8px;display:none}
.pgfill{height:100%;background:var(--ac);border-radius:2px;transition:width .1s;width:0}
.pglabel{font-size:10px;color:var(--mt);margin-top:3px;text-align:center;display:none;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* 사진 바텀시트 */
.photo-sheet-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:9990;align-items:flex-end;justify-content:center}
.photo-sheet-bg.open{display:flex}
.photo-sheet{background:#1c2128;border-radius:16px 16px 0 0;padding:20px 20px 36px;width:100%;max-width:480px;animation:slideUp .2s ease}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.photo-sheet-title{font-size:13px;font-weight:700;color:var(--mt);text-align:center;margin-bottom:16px;text-transform:uppercase;letter-spacing:.06em}
.photo-sheet-btn{display:flex;align-items:center;gap:14px;width:100%;padding:14px 16px;border:1px solid var(--bd2);border-radius:10px;background:var(--sur2);color:var(--tx);font-size:14px;font-weight:600;cursor:pointer;margin-bottom:10px;transition:all .15s}
.photo-sheet-btn:hover{background:var(--sur3);border-color:var(--ac)}
.photo-sheet-btn .ps-icon{font-size:22px;width:30px;text-align:center}
.photo-sheet-cancel{width:100%;padding:12px;border:none;border-radius:10px;background:var(--sur3);color:var(--mt);font-size:13px;font-weight:600;cursor:pointer;margin-top:4px}
.photo-sheet-cancel:hover{color:var(--tx)}
</style>
</head>
<body>

<!-- ════ 홈 뷰 ════ -->
<div id="homeView">
  <div class="home-header">
    <div class="home-logo">🧯</div>
    <div>
      <div class="home-title">소화전 점검 지도</div>
      <div class="home-subtitle">금천소방서 · 소화전 점검</div>
    </div>
  </div>
  <div class="home-content">
    <div class="section-header" style="margin-top:20px">
      <div class="section-title">계획 목록</div>
      <button class="btn btn-primary" onclick="showCreateModal()">+ 새 계획</button>
    </div>
    <div class="project-grid" id="projectGrid">
      <div class="empty-state" id="projectEmpty" style="grid-column:1/-1;display:none">
        <div class="big">📋</div>
        <p>등록된 계획 목록이 없습니다</p>
        <button class="btn btn-primary" onclick="showCreateModal()">+ 새 계획 만들기</button>
      </div>
    </div>
    <div id="appVersion" style="text-align:center;color:var(--mt);font-size:10.5px;padding:24px 0 12px;opacity:.6"></div>
  </div>
</div>

<!-- ════ 맵 뷰 ════ -->
<div id="mapView" style="display:flex;flex-direction:column">
  <div class="map-header" id="mapHeader">
    <div class="map-header-row1">
      <button class="back-btn" id="backBtn" onclick="handleBack()">← 이전 화면</button>
      <span class="map-header-title" id="mapHeaderTitle">점검 지도</span>
    </div>
    <div class="map-header-row2">
      <button class="btn btn-ghost" onclick="showUploadModal()" style="padding:5px 12px;font-size:12px;font-weight:700;flex-shrink:0">📂 소화전 업로드</button>
      <button class="btn btn-ghost" onclick="showResetColModal()" style="padding:5px 12px;font-size:12px;font-weight:700;flex-shrink:0">🔧 데이터 재설정</button>
      <button class="btn" onclick="exportExcel()" style="padding:5px 12px;font-size:12px;font-weight:700;flex-shrink:0;background:#22c55e;color:#fff;border:1px solid #22c55e">📊 결과 파일출력</button>
    </div>
  </div>
  <div class="layout">
    <div class="sidebar" id="sidebar">
      <div class="panel" id="groupPanel" style="display:none">
        <div class="ptitle" style="font-size:15px">👥 그룹</div>
        <select id="groupSelect" onchange="onGroupSelectChange(this.value)" style="width:100%;padding:8px 9px;font-size:12px;font-weight:700"></select>
      </div>
      <div class="panel">
        <div class="prog-wrap"><div class="prog-fill" id="progFill"></div><div class="prog-pct-text" id="progPctText">0%</div></div>
        <div class="insp-row" style="display:flex;gap:8px;margin-top:12px">
          <input type="text" id="inspNameGlobal" placeholder="점검자" oninput="saveInspName()"
            style="flex:1;min-width:0;padding:8px 9px;font-size:12.5px;font-weight:700;border-radius:6px;box-sizing:border-box;border:1.5px solid var(--bd2)"/>
          <input type="date" id="inspDateGlobal" onchange="saveInspDate()"
            style="flex:1.3;min-width:0;padding:8px 6px;font-size:12.5px;font-weight:700;border-radius:6px;color-scheme:dark;box-sizing:border-box;border:1.5px solid var(--bd2)"/>
        </div>
      </div>
      <div class="panel">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:7px">
          <div class="ptitle" style="margin:0;font-size:15px">🔍 소화전 검색</div>
          <div style="display:flex;gap:4px">
            <button class="fbtn" id="sortName" onclick="setSort('name')" style="font-size:12px;padding:3px 9px">이름</button>
            <button class="fbtn" id="sortAddr" onclick="setSort('addr')" style="font-size:12px;padding:3px 9px">주소</button>
            <button class="fbtn" id="sortType" onclick="setSort('type')" style="font-size:12px;padding:3px 9px">식구분</button>
          </div>
        </div>
        <div><input type="text" id="searchInput" placeholder="이름·주소 검색..." oninput="applyFilter()" style="width:100%;padding:7px 9px"></div>
      </div>
      <div class="list" id="listEl">
        <div style="text-align:center;color:var(--mt);font-size:12px;padding:30px 12px">
          📂 엑셀 파일을 업로드하면<br>점검 대상이 지도에 표시됩니다
        </div>
      </div>
    </div>
    <div class="map-wrap">
      <div id="mapPh" style="position:absolute;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:10px;color:var(--mt);font-size:13px">
        <div style="font-size:48px;opacity:.2">🗺️</div><div>지도 로딩 중...</div>
      </div>
      <div id="map"></div>
      <div class="map-search" id="mapSearch">
        <div class="map-search-row">
          <input type="text" id="mapSearchInput" placeholder="장소·주소 검색..." onkeydown="if(event.key==='Enter')searchMap()">
          <button class="map-search-sbtn" onclick="searchMap()">🔍</button>
          <button class="map-search-sbtn" onclick="closeMapSearch()" style="color:var(--mt)">✕</button>
        </div>
        <div class="map-search-results" id="mapSearchResults"></div>
      </div>
      <div class="map-toolbar-top" id="mapToolbarTop">
        <button class="tool-btn" id="btnSearch" onclick="toggleMapSearch()">🔍<span class="btn-txt"> 검색</span></button>
        <button class="tool-btn" id="btnSat" onclick="toggleSat()">🛰️<span class="btn-txt"> 위성</span></button>
        <button class="tool-btn" id="btnDist" onclick="toggleDist()">📏<span class="btn-txt"> 거리</span></button>
        <button class="tool-btn" id="btnRv" onclick="toggleRvMode()">🔭<span class="btn-txt"> 로드뷰</span></button>
        <button class="tool-btn" id="btnLabelToggle" onclick="toggleLabelVisibility()">🏷️<span class="btn-txt" id="btnLabelToggleTxt"> 이름 OFF</span></button>
        <button class="tool-btn" id="btnDistClear" onclick="clearDist()" style="display:none;font-size:11px;color:var(--hi)">✕<span class="btn-txt"> 초기화</span></button>
      </div>
      <div class="map-toolbar" id="mapToolbar">
        <button class="tool-btn" onclick="mapZoomIn()" style="font-size:16px;font-weight:700;letter-spacing:0">＋</button>
        <button class="tool-btn" onclick="mapZoomOut()" style="font-size:16px;font-weight:700;letter-spacing:0">－</button>
        <button class="tool-btn" id="btnMyLoc" onclick="toggleMyLocation()" style="font-size:15px">📍<span class="btn-txt"> 현위치</span></button>
      </div>
      <div class="dist-info" id="distInfo">클릭: 측정점 &nbsp;|&nbsp; 더블클릭: 완료<br>거리: <span id="distVal">0</span></div>
      <div class="rv-panel" id="rvPanel">
        <div class="rv-header">
          <span style="font-size:13px;font-weight:600;flex:1">🔭 로드뷰</span>
          <span style="font-size:11px;color:var(--mt)" id="rvHint"></span>
          <button onclick="toggleMinimap()" id="btnMinimap" style="padding:4px 9px;background:var(--sur2);color:var(--tx);border:1px solid var(--bd2);border-radius:6px;font-size:11px;cursor:pointer">🗺️ 미니맵</button>
          <button onclick="closeRv()" style="padding:5px 12px;background:#ef4444;color:#fff;border:none;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer;margin-left:8px">← 지도로</button>
        </div>
        <div class="rv-body">
          <div id="rvMap" style="width:100%;height:100%"></div>
          <div class="rv-minimap" id="rvMinimap"><div id="rvMinimapInner" style="width:100%;height:100%"></div></div>
        </div>
      </div>
      <div id="diagPanel">
        <div class="diag-box">
          <div style="font-size:15px;font-weight:700;color:var(--hi);margin-bottom:8px" id="diagTitle"></div>
          <div style="font-size:13px;color:var(--mt);margin-bottom:12px;line-height:1.6" id="diagDesc"></div>
          <div style="background:var(--sur2);border-radius:8px;padding:12px;font-size:12px" id="diagFix"></div>
          <button onclick="document.getElementById('diagPanel').style.display='none'" style="margin-top:12px;width:100%;padding:8px;background:var(--sur2);border:1px solid var(--bd2);border-radius:8px;color:var(--mt);cursor:pointer;font-size:12px">닫기</button>
        </div>
      </div>
    </div>
  </div>
  <button class="mob-toggle" id="mobToggle" onclick="toggleMobView()">🗺️ 지도 보기</button>
</div>

<!-- ════ 모달: 프로젝트 수정 ════ -->
<div class="modal-bg" id="editModal">
  <div class="modal">
    <h3>✏️ 프로젝트 수정</h3>
    <input type="hidden" id="editProjId">
    <div class="form-row">
      <label>프로젝트명 *</label>
      <input type="text" id="editProjName" placeholder="예: 소방용수 검수 2026-06">
    </div>
    <div class="form-row">
      <label>설명 (선택)</label>
      <textarea id="editProjDesc" placeholder="점검 목적, 대상 지역 등"></textarea>
    </div>
    <div class="form-row">
      <label>보관 기간</label>
      <select id="editProjExpire" style="padding:8px;background:var(--sur2);border:1px solid var(--bd2);color:var(--tx);border-radius:var(--r);font-size:13px">
        <option value="">변경 안 함</option>
        <option value="clear">영구 보관으로 변경</option>
        <option value="1">오늘부터 1개월</option>
        <option value="3">오늘부터 3개월</option>
        <option value="6">오늘부터 6개월</option>
        <option value="12">오늘부터 1년</option>
      </select>
      <div style="font-size:11px;color:var(--mt);margin-top:5px" id="editExpireInfo"></div>
    </div>
    <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:16px">
      <button class="btn btn-ghost" onclick="hideModal('editModal')">취소</button>
      <button class="btn btn-primary" onclick="saveEditProject()">저장</button>
    </div>
  </div>
</div>

<!-- ════ 모달: 프로젝트 생성 ════ -->
<div class="modal-bg" id="createModal">
  <div class="modal">
    <h3>📋 새 계획</h3>
    <div class="form-row">
      <label>프로젝트명 *</label>
      <input type="text" id="projName" placeholder="예: 소방용수 검수 2026-06">
    </div>
    <div class="form-row">
      <label>설명 (선택)</label>
      <textarea id="projDesc" placeholder="점검 목적, 대상 지역 등"></textarea>
    </div>
    <div class="form-row">
      <label>보관 기간 (선택)</label>
      <select id="projExpire" style="padding:8px;background:var(--sur2);border:1px solid var(--bd2);color:var(--tx);border-radius:var(--r);font-size:13px">
        <option value="">영구 보관</option>
        <option value="1">1개월</option>
        <option value="3">3개월</option>
        <option value="6">6개월</option>
        <option value="12">1년</option>
      </select>
    </div>
    <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:16px">
      <button class="btn btn-ghost" onclick="hideModal('createModal')">취소</button>
      <button class="btn btn-primary" onclick="createProject()">만들기</button>
    </div>
  </div>
</div>

<!-- ════ 모달: 엑셀 업로드 ════ -->
<!-- ════ 모달: 컬럼 재설정 옵션 (컬럼 매핑/미리보기/필터는 공통 ExcelUtil.createReader 사용) ════ -->
<div class="modal-bg" id="resetOptModal">
  <div class="modal" style="max-width:440px">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
      <h3 style="margin:0">🔧 엑셀 재설정</h3>
      <button onclick="hideModal('resetOptModal')" style="background:none;border:none;color:var(--mt);font-size:22px;cursor:pointer;line-height:1;padding:2px 6px">✕</button>

let hyState={};
function _hyEnsure(id){return hyState[id]||(hyState[id]={done:undefined,memo:'',photos:undefined,hydrant:undefined});}
function _hyMapView(key,emptyVal){
  return new Proxy({},{
    get(_,id){const s=hyState[id];return s?s[key]:undefined;},
    set(_,id,val){_hyEnsure(id)[key]=val;return true;},
    has(_,id){const s=hyState[id];return !!s&&s[key]!==undefined&&s[key]!==emptyVal;},
    deleteProperty(_,id){if(hyState[id])hyState[id][key]=emptyVal;return true;},
    ownKeys(){return Object.keys(hyState).filter(id=>{const s=hyState[id];return s&&s[key]!==undefined&&s[key]!==emptyVal;});},
    getOwnPropertyDescriptor(){return{enumerable:true,configurable:true};}
  });
}

  return `<span class="badge" style="background:rgba(255,255,255,.05);color:var(--mt)">📅 ${date}까지</span>`;
}
// 카드 메타(개소/완료/생성일/만료) HTML 생성 (공통)
// ══ 세분계획 생성/갱신 ══
// 부모 계획의 items에 있는 팀/조(group_name) 고유값마다 세분계획(가상 뷰) 레코드를 만든다.
// 세분계획은 자체 items를 갖지 않고, 열면 부모 데이터를 해당 조 필터로 잠가서 보여준다.
// 재실행하면 기존 세분계획을 지우고 현재 데이터 기준으로 다시 만든다 (엑셀 재업로드 후 갱신용).
async function generateSubPlans(parentId){
  const parent=projectList.find(x=>String(x.id)===String(parentId));
  if(!parent){showToast('계획을 찾을 수 없습니다','err');return;}
  showToast('팀/조 정보 확인 중...','');
  try{
    const rows=await SupabaseUtil.select('hydmap_items',{eq:{inspection_id:parentId},columns:'group_name'});
    const groups=[...new Set((rows||[]).map(r=>String(r.group_name||'').trim()).filter(Boolean))]
      .sort((a,b)=>a.localeCompare(b,'ko',{numeric:true,sensitivity:'base'}));
    if(!groups.length){showToast('팀/조 정보가 없습니다. 엑셀에 팀/조 컬럼을 매핑해서 업로드해주세요.','err');return;}
    // 팀 목록 추출: "1팀 2조" 형태에서 첫 토큰("1팀")을 팀으로 본다. 공백 없는 값("2조"만)은 팀 없음.
    const teams=[...new Set(groups.filter(g=>g.includes(' ')).map(g=>g.split(' ')[0]))]
      .sort((a,b)=>a.localeCompare(b,'ko',{numeric:true,sensitivity:'base'}));
    const existing=subPlanList.filter(sp=>String(sp.parent_id)===String(parentId));
    const summary=teams.length?`팀 ${teams.length}개 + 조 ${groups.length}개`:`조 ${groups.length}개`;
    const msg=existing.length
      ?`기존 세분계획 ${existing.length}개를 지우고 현재 데이터 기준(${summary})으로 다시 만듭니다.\n(점검 데이터는 부모 계획에 있으므로 사라지지 않습니다)\n계속하시겠습니까?`
      :`${summary}(${groups.slice(0,4).join(', ')}${groups.length>4?' 외':''}) 기준으로 세분계획을 생성합니다.\n계속하시겠습니까?`;
    if(!confirm(msg))return;
    if(existing.length)await SupabaseUtil.remove('hydmap_projects',{parent_id:parentId});
    // 팀 카드 먼저 (filter_group='1팀' — 열면 접두어 매칭으로 팀 전체 표시)
    for(const t of teams){
      await SupabaseUtil.insert('hydmap_projects',{
        name:`${t} 전체`,
        description:`${parent.name} — ${t} 소속 전 조`,
        parent_id:parentId,
        filter_group:t,
      });
    }
    // 조 카드 (filter_group='1팀 2조' — 정확 매칭으로 해당 조만 표시)
    for(const g of groups){
      await SupabaseUtil.insert('hydmap_projects',{
        name:g,
        description:`${parent.name} — ${g} 담당분`,
        parent_id:parentId,
        filter_group:g,
      });
    }
    showToast(`세분계획 ${teams.length+groups.length}개 생성 완료`,'ok');
    await loadProjects();
  }catch(e){
    showToast('세분계획 생성 실패: '+e.message,'err');
    console.error('generateSubPlans 오류:',e);
  }
}
function cardMetaHtml(p){
  const total=p._total==='-'?'-':(p._total||0);
  const done=p._done==='-'?'-':(p._done||0);
  const pct=(typeof total==='number'&&total)?Math.round(done/total*100):0;
  return `
    <span class="badge" style="background:rgba(47,129,247,.1);color:var(--ac)">${total}개소</span>
    <span class="badge" style="background:rgba(63,185,80,.1);color:var(--lo)">${done}완료 ${pct}%</span>
    <span class="badge" style="background:rgba(255,255,255,.05);color:var(--mt)">${new Date(p.created_at).toLocaleDateString('ko-KR')}</span>
    ${expireBadgeHtml(p.expire_at)}`;
}

async function loadProjects(){
  try{
    const projs=await SupabaseUtil.select('hydmap_projects',{order:{column:'created_at',ascending:false}});
    if(!Array.isArray(projs))throw new Error('응답 형식 오류');
    // 부모 계획과 세분계획(parent_id 있는 것) 분리
    const parents=projs.filter(p=>!p.parent_id);
    subPlanList=projs.filter(p=>p.parent_id);
    // sort_order가 있으면 그 순서(작을수록 위)로, 없는(0/null) 항목들은 기존 최신순 유지
    parents.sort((a,b)=>(a.sort_order||0)-(b.sort_order||0));
    subPlanList.sort((a,b)=>String(a.filter_group||'').localeCompare(String(b.filter_group||''),'ko',{numeric:true}));
    // 먼저 목록 표시 (건수 없이)
    projs.forEach(p=>{p._total='-';p._done='-';});
    renderProjects(parents);
    // 건수 일괄 로드: 전체 items/done을 2번 쿼리로 가져와 JS 집계 (N+1 제거)
    // 세분계획별 진행률까지 계산해야 하므로 group_name과 item id도 함께 가져온다
    try{
      const [allItems,allDone]=await Promise.all([
        SupabaseUtil.select('hydmap_items',{columns:'id,inspection_id,group_name'}),
        SupabaseUtil.select('hydmap_done',{columns:'item_id,inspection_id'})
      ]);
      const totalMap={},doneMap2={};
      const groupTotal={},groupDone={},itemGroup={};
      if(Array.isArray(allItems))allItems.forEach(x=>{
        totalMap[x.inspection_id]=(totalMap[x.inspection_id]||0)+1;
        const g=String(x.group_name||'').trim();
        itemGroup[x.id]=g;
        if(g){
          (groupTotal[x.inspection_id]=groupTotal[x.inspection_id]||{})[g]=(groupTotal[x.inspection_id]?.[g]||0)+1;
        }
      });
      if(Array.isArray(allDone))allDone.forEach(x=>{
        doneMap2[x.inspection_id]=(doneMap2[x.inspection_id]||0)+1;
        const g=itemGroup[x.item_id];
        if(g){
          (groupDone[x.inspection_id]=groupDone[x.inspection_id]||{})[g]=(groupDone[x.inspection_id]?.[g]||0)+1;
        }
      });
      projs.forEach(p=>{
        if(p.parent_id){
          // 세분계획: 조 카드는 정확 매칭, 팀 카드('1팀')는 '1팀 x조'들을 접두어 매칭으로 합산
          const fg=String(p.filter_group||'').trim();
          const match=k=>k===fg||k.startsWith(fg+' ');
          const gt=groupTotal[p.parent_id]||{},gd=groupDone[p.parent_id]||{};
          p._total=Object.keys(gt).reduce((s,k)=>s+(match(k)?gt[k]:0),0);
          p._done=Object.keys(gd).reduce((s,k)=>s+(match(k)?gd[k]:0),0);
        }else{
          p._total=totalMap[p.id]||0;
          p._done=doneMap2[p.id]||0;
        }
        const card=document.getElementById('pcard-'+p.id);
        if(card){
          const meta=card.querySelector('.project-card-meta');
          if(meta)meta.innerHTML=cardMetaHtml(p);
        }
      });
    }catch(e){console.warn('건수 로드 실패',e);}
  }catch(e){
    showToast('프로젝트 로드 실패: '+e.message,'err');
    console.error('loadProjects 오류:',e);
  }
}
function renderProjects(list){
  projectList=list;
  const grid=document.getElementById('projectGrid');
  if(!grid)return;
  // empty 요소를 먼저 분리 보관
  const empty=document.getElementById('projectEmpty');
  if(empty&&empty.parentNode===grid)grid.removeChild(empty);
  grid.innerHTML='';
  if(!list.length){
    if(empty){empty.style.display='block';grid.appendChild(empty);}
    return;
  }
  if(empty)empty.style.display='none';
  // ── 트리 접기/펼치기 상태 (localStorage에 기억) ──
  const frag=document.createDocumentFragment();
  list.forEach((p,i)=>{
    const children=subPlanList.filter(sp=>String(sp.parent_id)===String(p.id));
    const isTeamCard=sp=>children.some(o=>o.id!==sp.id&&String(o.filter_group||'').startsWith(String(sp.filter_group||'')+' '));
    const hasTeamParent=sp=>children.some(o=>o.id!==sp.id&&String(sp.filter_group||'').startsWith(String(o.filter_group||'')+' '));
    const card=document.createElement('div');
    card.className='project-card';
    card.id='pcard-'+p.id;
    card.dataset.id=p.id;
    const pOpen=_treeIsOpen(p.id,false);
    card.innerHTML=`
      <div class="project-card-updown">
        <button onclick="event.stopPropagation();moveProject('${p.id}',-1)" title="위로" ${i===0?'disabled':''}>▲</button>
        <button onclick="event.stopPropagation();moveProject('${p.id}',1)" title="아래로" ${i===list.length-1?'disabled':''}>▼</button>
      </div>
      <button class="project-card-del" onclick="event.stopPropagation();deleteProject('${p.id}','${esc(p.name)}')" title="삭제">✕</button>
      <button class="project-card-edit" onclick="event.stopPropagation();showEditModal('${p.id}')" title="수정">✏️</button>
      <div class="project-card-name">📋 ${esc(p.name)}</div>
      <div class="project-card-desc">${esc(p.description||'')}</div>
      <div class="project-card-meta">${cardMetaHtml(p)}</div>
      ${children.length?`<button class="tree-expand-btn" id="tt-${p.id}" data-count="${children.length}" data-kind="plan" onclick="event.stopPropagation();toggleTree('${p.id}',false)">${pOpen?'▲ 팀/조별 담당 접기':'▼ 팀/조별 담당 펼쳐 보기'}</button>`:''}
      <button class="subplan-btn" onclick="event.stopPropagation();generateSubPlans('${p.id}')" title="엑셀의 팀/조 값 기준으로 조별 세분계획을 생성하거나 갱신합니다">🗂 조별 세분계획 ${children.length?'갱신':'생성'}</button>`;
    card.onclick=()=>openProject(p);
    frag.appendChild(card);
    if(!children.length)return;
    // ── 하위 트리: 팀 노드 → 그 아래 소속 조 노드, 팀 없는 조는 부모 바로 아래 ──
    const wrap=document.createElement('div');
    wrap.className='tree-children';wrap.id='tw-'+p.id;
    wrap.style.display=pOpen?'flex':'none';
    const teams=children.filter(isTeamCard);
    const under=t=>children.filter(sp=>sp.id!==t.id&&String(sp.filter_group||'').startsWith(String(t.filter_group||'')+' '));
    teams.forEach(t=>{
      const jos=under(t);
      wrap.appendChild(_subPlanCard(t,true,jos.length));
      if(jos.length){
        const tw=document.createElement('div');
        tw.className='tree-children';tw.id='tw-'+t.id;
        tw.style.display=_treeIsOpen(t.id,true)?'flex':'none';
        jos.forEach(j=>tw.appendChild(_subPlanCard(j,false,0)));
        wrap.appendChild(tw);
      }
    });
    children.filter(sp=>!isTeamCard(sp)&&!hasTeamParent(sp)).forEach(j=>wrap.appendChild(_subPlanCard(j,false,0)));
    frag.appendChild(wrap);
  });
  grid.appendChild(frag);
}

// 드래그가 잘 안 될 때를 위한 대안: 버튼으로 한 칸씩 순서 이동
async function moveProject(id,dir){
  const i=projectList.findIndex(x=>String(x.id)===String(id));
  const j=i+dir;
  if(i<0||j<0||j>=projectList.length)return;
  [projectList[i],projectList[j]]=[projectList[j],projectList[i]];
  renderProjects(projectList);
  try{
    await Promise.all(projectList.map((p,idx)=>SupabaseUtil.update('hydmap_projects',{sort_order:idx},{id:p.id})));
    projectList.forEach((p,idx)=>{p.sort_order=idx;});
  }catch(e){showToast('순서 저장 실패: '+e.message,'err');}
}

  try{

    try{

    await SupabaseUtil.remove('hydmap_items',{inspection_id:id});

// ══ 최적화 5 ══
// 예전엔 hydmap_items/done/memo/photos/records를 inspection_id로 각각 따로 조회해
// 왕복 5번이 걸렸다. hydmap_done/memo/photos/records는 모두 item_id로 hydmap_items를
// 참조하는 FK 관계이므로, PostgREST 임베딩(select('*, hydmap_done(*), ...'))을 쓰면
// 쿼리 1번으로 합칠 수 있다. 혹시 FK 관계가 아직 안 걸려있거나 임베딩이 실패하면
// (예: 관계명이 다르거나 RLS로 막힌 경우) 기존 5-쿼리 방식으로 자동 폴백한다.
async function fetchProjectDataJoined(id){
  const itemsRes=await SupabaseUtil.select('hydmap_items',{
    eq:{inspection_id:id},
    order:{column:'created_at',ascending:true},
    columns:'*,hydmap_done(*),hydmap_memo(*),hydmap_photos(*),hydmap_records(*)'
  });
  // 임베딩된 결과에서 각 하위 데이터를 분리해 기존 코드와 동일한 배열 형태로 재구성
  const doneArr=[],memoArr=[],photosArr=[],hyArr=[];
  itemsRes.forEach(it=>{
    (it.hydmap_done||[]).forEach(x=>doneArr.push(x));
    (it.hydmap_memo||[]).forEach(x=>memoArr.push(x));
    (it.hydmap_photos||[]).forEach(x=>photosArr.push(x));
    (it.hydmap_records||[]).forEach(x=>hyArr.push(x));
    delete it.hydmap_done;delete it.hydmap_memo;delete it.hydmap_photos;delete it.hydmap_records;
  });
  // hydmap_photos는 created_at 오름차순이 필요 (원래 별도 쿼리에 order가 걸려있었음)
  photosArr.sort((a,b)=>String(a.created_at||'').localeCompare(String(b.created_at||'')));
  return{itemsRes,doneArr,memoArr,photosArr,hyArr};
}
async function fetchProjectDataSeparate(id){
  const [itemsRes,doneArr,memoArr,photosArr,hyArr]=await Promise.all([
    SupabaseUtil.select('hydmap_items',{eq:{inspection_id:id},order:{column:'created_at',ascending:true}}),
    SupabaseUtil.select('hydmap_done',{eq:{inspection_id:id}}),
    SupabaseUtil.select('hydmap_memo',{eq:{inspection_id:id}}),
    SupabaseUtil.select('hydmap_photos',{eq:{inspection_id:id},order:{column:'created_at',ascending:true}}),
    SupabaseUtil.select('hydmap_records',{eq:{inspection_id:id}}),
  ]);
  return{itemsRes,doneArr,memoArr,photosArr,hyArr};
}
async function loadProjectData(){
  if(!currentProject)return;
  const id=currentProject.id;
  try{
    let itemsRes,doneArr,memoArr,photosArr,hyArr;
    try{
      ({itemsRes,doneArr,memoArr,photosArr,hyArr}=await fetchProjectDataJoined(id));
    }catch(joinErr){
      // FK 임베딩 실패(관계 미설정 등) 시 기존 방식으로 폴백
      console.warn('조인 쿼리 실패, 개별 쿼리로 폴백:',joinErr);
      ({itemsRes,doneArr,memoArr,photosArr,hyArr}=await fetchProjectDataSeparate(id));
    }
    items=itemsRes;
    // 그룹 색상 맵 초기화 (순서 보장을 위해 items 순서대로 등록)
    Object.keys(_groupColorMap).forEach(k=>delete _groupColorMap[k]);
    items.forEach(d=>{if(d.group_name)groupColor(d);});
    hyState={}; // 통합 상태 저장소 초기화 (doneMap/memoMap/photoMap/hydrantMap은 이 객체의 뷰이므로 자동으로 함께 비워짐)
    doneArr.forEach(d=>{doneMap[d.item_id]=d;});
    memoArr.forEach(m=>{memoMap[m.item_id]=m.memo||'';});
    photosArr.forEach(p=>{if(!photoMap[p.item_id])photoMap[p.item_id]=[];photoMap[p.item_id].push(p);});
    (hyArr||[]).forEach(h=>{hydrantMap[h.item_id]=h;});
    hyDraft={};
    // 기본 정렬: 이름순
    sortMode='name';
    displayIndexOrder=items.map((d,i)=>i).sort((ia,ib)=>items[ia].name.localeCompare(items[ib].name,'ko'));
    document.getElementById('sortName')?.classList.add('active');
    document.getElementById('sortAddr')?.classList.remove('active');
    // 그룹 목록
    groups=[...new Set(items.map(d=>String(d.group_name||'').trim()).filter(Boolean))]
      .sort((a,b)=>a.localeCompare(b,'ko',{numeric:true,sensitivity:'base'}));
    // 색상표를 정렬된 그룹 순서로 선등록 → 매번 같은 조가 같은 색을 갖고, 팀 내(연속 순번) 조끼리는 색이 겹치지 않음
    resetGroupColors();
    groups.forEach(g=>groupColor({group_name:g}));
    buildGroupFilter();
    renderAllMarkers();
    renderList();
    // 세분계획(팀/조 잠금)으로 진입한 경우 등 초기 필터 상태를 마커/목록에 즉시 반영
    // (예전엔 필터를 한 번 조작해야 숨김이 적용되어, 팀 카드로 들어가도 처음엔 전체가 보이던 버그)
    applyFilter();
    updateStats();
    if(items.length)fitAll();
  }catch(e){showToast('데이터 로드 실패','err');}
}

// ━━ 그룹 필터 (119hyd-inspec과 동일하게 네이티브 select 드롭다운 사용 — 모바일에서 작은 필터 알약 버튼이 잘 눌리지 않는 문제 해결) ━━
function buildGroupFilter(){
  const panel=document.getElementById('groupPanel');
  const sel=document.getElementById('groupSelect');
  if(!groups.length){panel.style.display='none';return;}
  panel.style.display='block';
  // ── 세분계획 진입 잠금값 해석 ──
  // 정확히 일치하는 조가 있으면 → 조 잠금 모드 (드롭다운 비활성)
  // 접두어로 매칭되는 조들이 있으면('1팀' → '1팀 1조'...) → 팀 모드 (팀 내 조들만 전환 가능)
  // 둘 다 아니면(엑셀 재업로드로 사라짐) → 잠금 해제 + 안내
  if(lockedFilterGroup&&!groups.includes(lockedFilterGroup)){
    if(groups.some(g=>g.startsWith(lockedFilterGroup+' '))){
      teamFilterPrefix=lockedFilterGroup;lockedFilterGroup='';filterGroupVal='';
    }else{
      showToast(`'${lockedFilterGroup}' 조를 찾을 수 없어 전체를 표시합니다. 세분계획을 갱신해주세요.`,'err');
      lockedFilterGroup='';teamFilterPrefix='';filterGroupVal='';
    }
  }
  const cur=filterGroupVal;
  if(teamFilterPrefix){
    // 팀 모드: 팀 소속 조들만 드롭다운에 표시. 기본값은 "팀 전체"(팀 내 모든 조).
    const teamGroups=groups.filter(g=>g===teamFilterPrefix||g.startsWith(teamFilterPrefix+' '));
    sel.innerHTML=`<option value="">${esc(teamFilterPrefix)} 전체</option>`
      +teamGroups.map(g=>`<option value="${esc(g)}">${esc(g)}</option>`).join('');
    sel.value=teamGroups.includes(cur)?cur:'';
    if(!teamGroups.includes(cur))filterGroupVal='';
    sel.disabled=false;
  }else{
    sel.innerHTML=`<option value="">전체 그룹 (모든 소화전 표시)</option>`
      +groups.map(g=>`<option value="${esc(g)}">${esc(g)}</option>`).join('');
    sel.value=groups.includes(cur)?cur:'';
    if(lockedFilterGroup){
      // 조 잠금 모드
      filterGroupVal=lockedFilterGroup;
      sel.value=lockedFilterGroup;
      sel.disabled=true;
    }else{
      sel.disabled=false;
    }
  }
  updateGroupCounts();
}
function onGroupSelectChange(g){
  filterGroupVal=g||'';
  applyFilter();
}
function updateGroupCounts(){
  const sel=document.getElementById('groupSelect');
  if(!sel)return;
  const vis=items.filter(d=>!filterText||d.name.toLowerCase().includes(filterText.toLowerCase()));
  const opts=sel.querySelectorAll('option');
  opts.forEach(opt=>{
    if(!opt.value){
      if(teamFilterPrefix){
        const cnt=vis.filter(d=>{const g=String(d.group_name||'').trim();return g===teamFilterPrefix||g.startsWith(teamFilterPrefix+' ');}).length;
        opt.textContent=`${teamFilterPrefix} 전체 (${cnt})`;
      }else{
        opt.textContent='전체 그룹 (모든 소화전 표시)';
      }
      return;
    }
    const cnt=vis.filter(d=>String(d.group_name||'').trim()===opt.value).length;
    opt.textContent=`${opt.value} (${cnt})`;
  });
}
function isHidden(d){
  const g=String(d.group_name||'').trim();
  // 팀 모드: 팀 밖 소화전은 항상 숨김 (필터 전환과 무관하게 팀 범위 밖으로 못 나감)
  if(teamFilterPrefix&&!(g===teamFilterPrefix||g.startsWith(teamFilterPrefix+' ')))return true;
  if(filterGroupVal&&g!==String(filterGroupVal).trim())return true;
  if(filterText&&!d.name.toLowerCase().includes(filterText.toLowerCase())&&!(d.address||'').toLowerCase().includes(filterText.toLowerCase()))return true;
  return false;
}
let sortMode='';
function setSort(mode){
  if(sortMode===mode){
    sortMode='';
    document.getElementById('sortName')?.classList.remove('active');
    document.getElementById('sortAddr')?.classList.remove('active');
    document.getElementById('sortType')?.classList.remove('active');
  }else{
    sortMode=mode;
    document.getElementById('sortName')?.classList.toggle('active',mode==='name');
    document.getElementById('sortAddr')?.classList.toggle('active',mode==='addr');
    document.getElementById('sortType')?.classList.toggle('active',mode==='type');
  }
  // ⚠ items 배열 자체를 sort()하면 overlays(인덱스 기반)와 매핑이 깨져서
  //    "정렬 후 클릭하면 엉뚱한 카드가 열리는" 버그가 생긴다.
  //    그래서 items는 그대로 두고, 표시 순서(원본 인덱스 배열)만 별도로 정렬한다.
  if(sortMode==='name'){
    displayIndexOrder=items.map((d,i)=>i).sort((ia,ib)=>items[ia].name.localeCompare(items[ib].name,'ko'));
  }else if(sortMode==='addr'){
    displayIndexOrder=items.map((d,i)=>i).sort((ia,ib)=>(items[ia].address||'').localeCompare(items[ib].address||'','ko'));
  }else if(sortMode==='type'){
    // 지상식 → 지하식 → 미확인 순으로 묶어서 정렬
    const rank=i=>{
      const d=items[i];
      const t=hydrantMap[d.id]?.hydrant_type||getExcelHydrantType(d);
      return t==='ground'?0:t==='underground'?1:2;
    };
    displayIndexOrder=items.map((d,i)=>i).sort((ia,ib)=>rank(ia)-rank(ib)||items[ia].name.localeCompare(items[ib].name,'ko'));
  }else{
    displayIndexOrder=null;
  }
  renderList();
  applyFilter();
}

function applyFilter(){
  filterText=document.getElementById('searchInput').value.trim();
  const toAdd=[],toRemove=[];
  items.forEach((d,i)=>{
    const hide=isHidden(d);
    document.getElementById(`item-${i}`)?.classList.toggle('hidden',hide);
    const o=overlays[i];
    if(o){
      o.overlay?.setMap(hide?null:kakaoMap);
      o.labelOverlay?.setMap((hide||!labelsOn)?null:kakaoMap);
      // 클러스터러 계산용 invisible 마커도 같이 빼줘야 카카오 기본 풍선이 남지 않음
      if(clusterer&&o.clMarker&&o.hidden!==hide){
        if(hide)toRemove.push(o.clMarker);
        else toAdd.push(o.clMarker);
        o.hidden=hide;
      }
    }
  });
  // 마커 하나씩 addMarker/removeMarker를 반복 호출하면(특히 항목이 수백 개일 때) 매번
  // 재계산이 일어나 모바일에서 버벅이거나 반영이 늦어 보이는 문제가 있어, 한 번에 일괄 처리 후 다시 그린다
  if(clusterer){
    if(toRemove.length)clusterer.removeMarkers(toRemove);
    if(toAdd.length)clusterer.addMarkers(toAdd,true);
    clusterer.redraw();
  }
  updateStats();updateGroupCounts();
}

// ━━ 통계 ━━
function updateStats(){
  const filtered=items.filter(d=>!isHidden(d));
  const tot=filtered.length;
  const done=filtered.filter(d=>doneMap[d.id]).length;
  const pct=tot?Math.round(done/tot*100):0;
  document.getElementById('sTot')&&(document.getElementById('sTot').textContent=tot);
  document.getElementById('sDone')&&(document.getElementById('sDone').textContent=done);
  document.getElementById('sLeft')&&(document.getElementById('sLeft').textContent=tot-done);
  document.getElementById('sPct')&&(document.getElementById('sPct').textContent=pct+'%');
  document.getElementById('progFill').style.width=pct+'%';
  document.getElementById('progPctText').textContent=pct+'%';
}

/* ══════════ Kakao Map ══════════ */
function initKakaoMap(){
  if(kakaoMap){document.getElementById('mapPh').style.display='none';return Promise.resolve();}
  return new Promise((resolve,reject)=>{
    const timer=setTimeout(()=>reject(new Error('TIMEOUT')),10000);
    const s=document.createElement('script');
    s.src=`https://dapi.kakao.com/v2/maps/sdk.js?appkey=${JS_KEY}&autoload=false&libraries=services,clusterer`;
    s.onerror=()=>{clearTimeout(timer);reject(new Error('SCRIPT_LOAD'));};
    s.onload=()=>{kakao.maps.load(()=>{
      clearTimeout(timer);
      try{
        document.getElementById('mapPh').style.display='none';
        kakaoMap=new kakao.maps.Map(document.getElementById('map'),{center:new kakao.maps.LatLng(37.46,126.90),level:5});
        clusterer=new kakao.maps.MarkerClusterer({
          map:kakaoMap,
          averageCenter:true,
          minLevel:6,
          disableClickZoom:false,
          styles:[{
            width:'36px',height:'36px',background:'rgba(47,129,247,.85)',
            borderRadius:'50%',color:'#fff',textAlign:'center',
            fontWeight:'700',fontSize:'13px',lineHeight:'36px',
            border:'2px solid #fff',boxShadow:'0 2px 6px rgba(0,0,0,.4)'
          }]
        });
        // 모바일은 지도 보기 클릭 시 툴바 표시, PC는 항상 표시
        if(window.innerWidth>768){
          document.getElementById('mapToolbar').style.display='flex';
          document.getElementById('mapToolbarTop').style.display='flex';
        }
        kakao.maps.event.addListener(kakaoMap,'click',(e)=>{
          document.getElementById('mapSearchResults').style.display='none';
          if(fixLocationIdx>=0){confirmAndApplyFixLocation(fixLocationIdx,e.latLng);return;}
          if(rvMode){openRvAt(e.latLng);setRvMode(false);return;}
          if(distMode){distPath.push(e.latLng);addDistMarker(e.latLng);updateDistLine();}
        });
        kakao.maps.event.addListener(kakaoMap,'dblclick',()=>{if(distMode)finishDist();});
        resolve();
      }catch(e){reject(new Error('MAP_CREATE'));}
    });};
    document.head.appendChild(s);
  }).catch(e=>{showDiag(e.message);});
}
function showDiag(code){
  const msgs={'TIMEOUT':{t:'도메인 미등록',d:'Kakao 콘솔에 현재 도메인을 등록하세요.',f:'developers.kakao.com → 내 애플리케이션 → 플랫폼 → Web'},'SCRIPT_LOAD':{t:'JS 키 오류',d:'403 오류',f:'JS 키와 도메인 확인'}};
  const m=msgs[code]||{t:'오류:'+code,d:'',f:'새로고침하세요'};
  document.getElementById('diagTitle').textContent='⚠️ '+m.t;
  document.getElementById('diagDesc').textContent=m.d;
  document.getElementById('diagFix').innerHTML=m.f+'<br><b>'+location.origin+'</b>';
  document.getElementById('diagPanel').style.display='flex';
}

/* ══════════ Marker & List Render ══════════ */
const _groupColorMap={};
function resetGroupColors(){for(const k in _groupColorMap)delete _groupColorMap[k];}
function groupColor(d){
  if(!d.group_name)return GROUP_COLORS[0];
  if(!_groupColorMap[d.group_name]){
    const keys=Object.keys(_groupColorMap);
    _groupColorMap[d.group_name]=GROUP_COLORS[keys.length%GROUP_COLORS.length];
  }
  return _groupColorMap[d.group_name];
}
// CSS 클래스는 g1~g6(+g0 회색)까지만 존재하므로 그룹이 6개를 넘으면 색을 순환시킨다.
// (예전엔 indexOf+1을 그대로 써서 7번째 그룹부터 존재하지 않는 g7, g8...이 되어 전부 기본 빨강으로 표시되던 버그)
function groupCls(d){
  const g=String(d.group_name||'').trim();
  if(!g)return 'g0';
  groupColor(d); // 색상표 등록 보장
  const idx=Object.keys(_groupColorMap).indexOf(g);
  return 'g'+((idx%GROUP_COLORS.length)+1);
}

// 정보카드(위로 길게 펼쳐짐)를 열 때, 마커를 화면 정중앙이 아니라
// 화면 중앙보다 아래쪽으로 이동시켜서 카드가 위쪽으로 펼쳐질 공간을 확보한다.
// (그냥 marker만 중앙에 두면 카드가 위쪽으로 잘리거나 위로 치우쳐 보이는 문제가 있었음 — PC/모바일 공통 적용)
function panToForCard(lat,lng){
  if(!kakaoMap)return;
  try{
    const proj=kakaoMap.getProjection();
    const mapEl=document.getElementById('map');
    const h=mapEl?mapEl.clientHeight:window.innerHeight;
    const point=proj.containerPointFromCoords(new kakao.maps.LatLng(lat,lng));
    const offsetY=Math.round(h*0.28); // 화면 아래쪽으로 내려서 카드+마커 조합이 시각적으로 중앙에 오도록
    const newPoint=new kakao.maps.Point(point.x,point.y-offsetY);
    const newLatLng=proj.coordsFromContainerPoint(newPoint);
    kakaoMap.panTo(newLatLng);
  }catch(e){
    // 프로젝션 계산 실패 시 기본 동작으로 폴백
    kakaoMap.panTo(new kakao.maps.LatLng(lat,lng));
  }
}

function renderAllMarkers(){
  Object.values(overlays).forEach(o=>{o.overlay?.setMap(null);o.iw?.setMap(null);o.labelOverlay?.setMap(null);});
  if(clusterer)clusterer.clear();
  overlays={};
  items.forEach((d,i)=>{if(d.lat&&d.lng)addMarker(i,d);});
}
let _transparentMarkerImg=null;
function getTransparentMarkerImage(){
  if(!_transparentMarkerImg){
    _transparentMarkerImg=new kakao.maps.MarkerImage(
      'data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII=',
      new kakao.maps.Size(1,1)
    );
  }
  return _transparentMarkerImg;
}
// 지상식/지하식 구분 아이콘 (마커 안에 표시). 종류를 알 수 없으면 빈 원 그대로 둔다.
const HY_ICON_GROUND=`<svg viewBox="0 0 24 24" width="80%" height="80%" style="pointer-events:none;display:block;margin:auto"><path fill="#fff" d="M9 3h6v2h1a1 1 0 0 1 1 1v1h-1.2l.9 1.8-1.8.9L13 7.5V9h-2V7.5l-1.9 2.2-1.8-.9L8.2 7H7V6a1 1 0 0 1 1-1h1V3zM8 11h8v9a1 1 0 0 1-1 1H9a1 1 0 0 1-1-1v-9z"/></svg>`;
const HY_ICON_UNDER=`<svg viewBox="0 0 24 24" width="80%" height="80%" style="pointer-events:none;display:block;margin:auto"><circle cx="12" cy="12" r="8.5" fill="none" stroke="#fff" stroke-width="2"/><circle cx="12" cy="12" r="2.6" fill="#fff"/><line x1="12" y1="2.8" x2="12" y2="6.4" stroke="#fff" stroke-width="1.8"/><line x1="12" y1="17.6" x2="12" y2="21.2" stroke="#fff" stroke-width="1.8"/><line x1="2.8" y1="12" x2="6.4" y2="12" stroke="#fff" stroke-width="1.8"/><line x1="17.6" y1="12" x2="21.2" y2="12" stroke="#fff" stroke-width="1.8"/></svg>`;
function getMarkerIconHtml(d){
  const type=hydrantMap[d.id]?.hydrant_type||getExcelHydrantType(d);
  if(type==='ground')return HY_ICON_GROUND;
  if(type==='underground')return HY_ICON_UNDER;
  return '';
}
// 점검 저장/위치 수정 등으로 종류가 바뀌었을 때 마커 아이콘을 다시 그린다
function updateMarkerIcon(idx){
  const d=items[idx],o=overlays[idx];
  if(!d||!o||!o.overlay)return;
  const el=o.overlay.getContent&&o.overlay.getContent();
  if(el)el.innerHTML=getMarkerIconHtml(d);
}
function addMarker(idx,d){
  const isDone=!!doneMap[d.id];
  const color=groupColor(d);
  const el=document.createElement('div');
  el.className=`kk-marker ${groupCls(d)}${isDone?' done':''}`;
  el.id='mk-'+idx;
  el.style.position='relative';
  el.innerHTML=getMarkerIconHtml(d);

  // 툴팁: body에 단 하나의 공유 툴팁 요소를 사용 (stacking context 탈출)
  el.addEventListener('mouseenter',()=>{
    if(iwOpen===iw)return;
    const r=el.getBoundingClientRect();
    _sharedTooltip.textContent=d.name;
    _sharedTooltip.style.left=(r.left+r.width/2)+'px';
    _sharedTooltip.style.top=(r.bottom+6)+'px';
    _sharedTooltip.style.opacity='1';
  });
  el.addEventListener('mouseleave',()=>{_sharedTooltip.style.opacity='0';});
  // 이름 말풍선 레이블을 CustomOverlay로 마커 아래 항상 준비해두고, "이름 ON/OFF" 토글로 표시 여부만 제어한다.
  // (예전엔 터치 기기에서만 만들었는데, 그러면 PC에서는 토글을 눌러도 아무 효과가 없어 보이는 문제가 있었음)
  const _labelColor=groupColor(d);
  const labelEl=document.createElement('div');
  labelEl.style.cssText=`padding:3px 8px;font-size:11px;font-weight:700;color:${_labelColor};background:rgba(255,255,255,0.95);border:1.5px solid ${_labelColor};border-radius:12px;white-space:normal;max-width:120px;word-break:keep-all;text-align:center;line-height:1.4;box-shadow:0 2px 6px rgba(0,0,0,.2);pointer-events:auto;cursor:pointer`;
  labelEl.addEventListener('click',e=>{e.stopPropagation();openIw();});
  let _lbTouchMoved=false;
  labelEl.addEventListener('touchstart',()=>{_lbTouchMoved=false;},{passive:true});
  labelEl.addEventListener('touchmove',()=>{_lbTouchMoved=true;},{passive:true});
  labelEl.addEventListener('touchend',e=>{e.stopPropagation();if(!_lbTouchMoved){e.preventDefault();openIw();}},{passive:false});
  labelEl.textContent=d.name;
  const labelOverlay=new kakao.maps.CustomOverlay({
    position:new kakao.maps.LatLng(d.lat,d.lng),
    content:labelEl,
    xAnchor:0.5,yAnchor:-0.2,
    zIndex:9,
  });
  if(labelsOn)labelOverlay.setMap(kakaoMap);

  const iwEl=document.createElement('div');
  iwEl.className='iw-wrap';
  ['click','mousedown','mousemove','dblclick','wheel','touchstart','touchmove','touchend'].forEach(ev=>{
    iwEl.addEventListener(ev,e=>e.stopPropagation(),{passive:false});
  });
  // 카드 내부 터치 스크롤 처리
  let touchStartY=0;
  iwEl.addEventListener('touchstart',e=>{touchStartY=e.touches[0].clientY;},{passive:true});
  iwEl.addEventListener('touchmove',e=>{
    const dy=e.touches[0].clientY-touchStartY;
    const atTop=iwEl.scrollTop===0;
    const atBottom=iwEl.scrollTop+iwEl.clientHeight>=iwEl.scrollHeight;
    if((atTop&&dy>0)||(atBottom&&dy<0))return;
    e.stopPropagation();
  },{passive:false});

  const iw=new kakao.maps.CustomOverlay({position:new kakao.maps.LatLng(d.lat,d.lng),content:iwEl,yAnchor:1.03,zIndex:100});
  // 최적화 2: 팝업 HTML(사진 그리드, 점검 폼 등)은 무겁기 때문에
  // 마커 생성 시점(전체 로드)에 미리 만들지 않고, 실제로 카드가 열릴 때 딱 한 번만 생성한다.
  // 수백 개 마커를 로드해도 실제로 클릭해서 연 것만 DOM 비용을 지불하게 됨.

  function openIw(){
    // 이미 이 마커의 카드가 열려있는 상태에서 다시 클릭하면 닫는다 (토글)
    if(iwOpen===iw){
      closeIw();
      return;
    }
    ensurePopupRendered(idx);
    if(iwOpen)iwOpen.setMap(null);
    if(activeMarkerEl)activeMarkerEl.classList.remove('active-mk');
    el.classList.add('active-mk');activeMarkerEl=el;
    _sharedTooltip.style.opacity='0';
    clearTimeout(_tipTimer); // 정보카드 열리면 툴팁 타이머 취소
    iw.setMap(kakaoMap);iwOpen=iw;
    setActive(idx);panToForCard(d.lat,d.lng);
  }
  el.addEventListener('click',e=>{e.stopPropagation();openIw();});
  // 모바일: CustomOverlay 내부에서 click이 누락되는 경우가 있어 touchend로 보완
  let _touchMoved=false,_tipTimer=null;
  el.addEventListener('touchstart',()=>{_touchMoved=false;},{passive:true});
  el.addEventListener('touchmove',()=>{_touchMoved=true;},{passive:true});
  el.addEventListener('touchend',e=>{e.stopPropagation();if(!_touchMoved){e.preventDefault();openIw();}},{passive:false});
  const overlay=new kakao.maps.CustomOverlay({position:new kakao.maps.LatLng(d.lat,d.lng),content:el,zIndex:10});
  overlay.setMap(kakaoMap);
  // 클러스터러용 invisible 마커 (줌 레벨 6 이상에서 클러스터로 묶임)
  // ⚠ opacity:0만으로는 클러스터러가 줌인 시 마커를 재표시할 때 카카오 기본 풍선 아이콘이 노출됨
  //    → 완전 투명 1x1 PNG를 마커 이미지로 지정해 원천 차단
  const clMarker=new kakao.maps.Marker({position:new kakao.maps.LatLng(d.lat,d.lng),image:getTransparentMarkerImage()});
  if(clusterer)clusterer.addMarker(clMarker,true);
  overlays[idx]={overlay,iw,clMarker,labelOverlay,hidden:false,popupRendered:false};
}

/* ══════════ 소화전 점검 입력 (정보카드 내) ══════════ */
// ━━ 정보카드 컴팩트 UX: 선택사항(도색/보온/보호틀) 항목을 접이식으로 ━━
// 필수(종류·사용가부)만 항상 펼쳐두고, 나머지는 "입력" 버튼 → 탭하면 펼쳐지고
// 값을 고르면 자동으로 다시 접혀서, 모바일에서 카드가 화면을 다 차지하지 않도록 한다.
let hyExpanded={}; // key: `${idx}:${field}` → true면 펼침
const PAINT_LABEL={yes:'양호',mid:'보통',no:'재도색'};
const INSUL_LABEL={yes:'설치됨',mid:'불필요',no:'재설치'};
const PROTECT_LABEL={yes:'설치',no:'미설치'};
function hyToggleSection(idx,field){
  const key=`${idx}:${field}`;
  hyExpanded[key]=!hyExpanded[key];
  hyReRender(idx);
}
// summaryText: 이미 선택된 값이 있으면 그 값을 라벨로 보여주고, 없으면 "입력"만 표시
function hyCollapsibleField(idx,field,title,labelMap,rawValue,expandedHtml){
  const key=`${idx}:${field}`;
  const isOpen=!!hyExpanded[key];
  const summary=labelMap?(labelMap[rawValue]||''):(rawValue||'');
  if(!isOpen){
    return `
    <div class="hy-section hy-collapsible">
      <button class="hy-collapse-btn" onclick="hyToggleSection(${idx},'${field}')">
        <span>${title}</span>
        <span class="hy-collapse-val">${summary?esc(summary):'입력'} ▾</span>
      </button>
    </div>`;
  }
  return `
    <div class="hy-section hy-collapsible open">
      <button class="hy-collapse-btn open" onclick="hyToggleSection(${idx},'${field}')">
        <span>${title}</span>
        <span class="hy-collapse-val">접기 ▴</span>
      </button>
      <div class="hy-collapse-body">${expandedHtml}</div>
    </div>`;
}
function hyStatusInfo(rec){
  const r=rec?.result;
  if(!r)return{label:'🔲 미점검',bg:'#94a3b822',fg:'#64748b'};
  if(['A','B','C','D'].includes(r))return{label:`✅ 양호 (${r}등급)`,bg:'#22c55e22',fg:'#16a34a'};
  if(r==='불량사용가')return{label:'🔧 고장·사용가능',bg:'#f59e0b22',fg:'#b45309'};
  if(r==='불량사용불가')return{label:'⛔ 고장·사용불가',bg:'#ef444422',fg:'#dc2626'};
  return{label:'🔲 미점검',bg:'#94a3b822',fg:'#64748b'};
}
// 엑셀에서 자동 판별된 종류(_type)가 있으면 그걸 쓰고, 없으면 다른 추가정보 필드(예: '정보'
// 컬럼에 "지하식(일반)"처럼 들어간 경우)라도 지상/지하 키워드를 뒤져서 판별한다.
// → 업로드 시 종류 컬럼을 "추가정보"로 잘못 매핑했어도 카드에서는 정상적으로 자동 인식됨.
function getExcelHydrantType(d){
  if(!d.extra)return null;
  if(d.extra._type)return d.extra._type;
  const vals=Object.values(d.extra).join(' ');
  if(/지상/.test(vals))return 'ground';
  if(/지하/.test(vals))return 'underground';
  return null;
}
function hyGetDraft(idx,d){
  if(!hyDraft[idx]){
    const rec=hydrantMap[d.id];
    // 저장된 점검 기록이 아직 없으면, 엑셀에서 자동 판별된 종류(있는 경우)를 기본값으로 사용
    const excelType=getExcelHydrantType(d);
    hyDraft[idx]={
      hydrant_type:rec?.hydrant_type||excelType||null,
      paint:rec?.paint||null,
      insul:rec?.insul||null,
      protect:rec?.protect||null,
      roadmark:rec?.roadmark||null,
      result:rec?.result||null,
      resultTop:rec?.result?(['A','B','C','D'].includes(rec.result)?'양호':rec.result):null,
      defect_detail:rec?.defect_detail||'',
      _fromExcel:!rec&&!!excelType
    };
  }
  return hyDraft[idx];
}
function hyReRender(idx){
  const d=items[idx],ov=overlays[idx];
  if(!d||!ov||!ov.iw)return;
  const el=ov.iw.getContent&&ov.iw.getContent();
  if(el){renderPopup(el,idx,d,ov.iw);ov.popupRendered=true;}
}
function hySetType(idx,val){
  const d=items[idx];if(!d)return;
  const draft=hyGetDraft(idx,d);
  // 엑셀에서 자동 판별된 값과 다른 버튼을 누르면 실수 방지용 확인창을 띄운다
  if(draft._fromExcel&&draft.hydrant_type&&draft.hydrant_type!==val){
    const label=val==='ground'?'지상식':'지하식';
    if(!confirm(`${label}으로 바꾸시겠습니까?`))return;
    draft._fromExcel=false; // 수동으로 확정했으므로 자동판별 상태 해제
  }
  draft.hydrant_type=(draft.hydrant_type===val)?null:val;
  hyReRender(idx);
  hyMaybeAutoSave(idx);
}
function hySetField(idx,field,val){
  const d=items[idx];if(!d)return;
  const draft=hyGetDraft(idx,d);
  if(field==='defect_detail'){draft.defect_detail=val;return;}
  draft[field]=(draft[field]===val)?null:val;
  // 값 하나를 고르면 해당 접이식 섹션은 자동으로 접어서 카드를 다시 컴팩트하게 만든다.
  // (단, 보호틀·노면표시는 항목이 2개라 하나 고르자마자 접으면 나머지를 못 고르니 자동 접힘 제외)
  if(field==='paint'||field==='insul'){
    hyExpanded[`${idx}:${field}`]=false;
  }
  hyReRender(idx);
  hyMaybeAutoSave(idx);
}
function hySetResultTop(idx,val){
  const d=items[idx];if(!d)return;
  const draft=hyGetDraft(idx,d);
  draft.resultTop=(draft.resultTop===val)?null:val;
  if(draft.resultTop==='양호'){
    if(!['A','B','C','D'].includes(draft.result))draft.result=null;
  }else if(draft.resultTop){
    draft.result=draft.resultTop;
  }else{
    draft.result=null;
  }
  hyReRender(idx);
  hyMaybeAutoSave(idx);
}
function hySetGrade(idx,val){
  const d=items[idx];if(!d)return;
  const draft=hyGetDraft(idx,d);
  draft.result=val;
  hyReRender(idx);
  hyMaybeAutoSave(idx);
}
// ━━ 자동 저장 (디바운스 + 직렬화) ━━
// 토글을 연타해도 마지막 변경 후 600ms 뒤 1회만 저장하고, 같은 항목의 저장이 진행 중이면
// 끝난 뒤 최신 상태로 한 번 더 저장한다 (동시 upsert로 값이 꼬이는 경쟁상태 방지).
const AUTOSAVE_DEBOUNCE_MS=600;
const _autoSaveTimers={};   // idx → setTimeout id
const _saveInFlight={};     // idx → true(저장 중)
const _saveQueued={};       // idx → true(저장 중에 또 변경됨 → 끝나고 재저장)
function hyMaybeAutoSave(idx){
  const d=items[idx];if(!d)return;
  const draft=hyGetDraft(idx,d);
  if(!(draft.hydrant_type&&draft.result))return;
  clearTimeout(_autoSaveTimers[idx]);
  _autoSaveTimers[idx]=setTimeout(()=>hySaveNow(idx),AUTOSAVE_DEBOUNCE_MS);
}
async function hySaveNow(idx){
  const d=items[idx];if(!d||!currentProject)return;
  if(_saveInFlight[idx]){_saveQueued[idx]=true;return;} // 진행 중이면 예약만
  const draft=hyGetDraft(idx,d);
  if(!draft.hydrant_type||!draft.result)return; // 필수 항목 미완성 — 자동저장 대상 아님
  const name=getInspName();
  if(!name){showToast('상단에 점검자 이름을 입력하세요','err');return;}
  const record={
    item_id:d.id,
    inspection_id:currentProject.id,
    hydrant_type:draft.hydrant_type,
    paint:draft.paint,
    insul:draft.hydrant_type==='underground'?draft.insul:null,
    protect:draft.hydrant_type==='ground'?draft.protect:null,
    roadmark:draft.hydrant_type==='ground'?draft.roadmark:null,
    result:draft.result,
    defect_detail:(draft.defect_detail||'').trim(),
    insp_name:name,
    insp_date:getInspDate(),
    updated_at:new Date().toISOString()
  };
  _saveInFlight[idx]=true;
  try{
    const saved=await SupabaseUtil.upsert('hydmap_records',record,'item_id');
    hydrantMap[d.id]=Array.isArray(saved)?(saved[0]||record):(saved||record);
    // 저장 중 추가 변경이 없었을 때만 draft를 비운다 (있으면 최신 draft 유지 후 재저장)
    if(!_saveQueued[idx])delete hyDraft[idx];
    showToast('✅ 자동 저장됨','ok');
    hyReRender(idx);
    updateMarkerIcon(idx);
    updateStats();
    updateListItem(idx);
  }catch(e){showToast('저장 실패: '+(e?.message||''),'err');}
  finally{
    _saveInFlight[idx]=false;
    if(_saveQueued[idx]){_saveQueued[idx]=false;hySaveNow(idx);} // 밀린 변경 재저장
  }
}

function renderPhotoGrid(idx,photos){
  const grid=document.getElementById(`photoGrid-${idx}`);
  if(!grid)return;
  // innerHTML로 전체 렌더 (onclick 인라인 사용)

// ━━ 이미지 압축 (공통 Utils 모듈) ━━
// 장변 1280px 이하, JPEG quality 0.75 → 압축 결과가 더 크면 원본 사용
async function compressImage(file){
  try{
    const blob=await Utils.compressImage(file,{maxWidth:1280,maxHeight:1280,quality:0.75});
    return (blob&&blob.size<file.size)?blob:file;
  }catch{ return file; }
}

// ━━ 사진 (Cloudinary 업로드) ━━
// 현장에서 통신이 불안정할 때(지하 소화전, 지하주차장 등) 업로드가 한 번에 실패하는 경우가 많아
// 지수 백오프로 최대 2회 재시도한다. 네트워크 요청 자체가 아예 안 나간 경우(fetch 자체 실패)와
// 서버가 명확히 4xx로 거절한 경우(잘못된 preset 등)는 재시도해도 의미 없으므로 구분해서 처리한다.
async function uploadToCloudinaryOnce(blob,folder){
  const formData=new FormData();
  formData.append('upload_preset',CLOUDINARY_PRESET);
  formData.append('folder',`hydmap/${folder}`);
  formData.append('file',blob);
  const res=await fetch(CLOUDINARY_UPLOAD_URL,{method:'POST',body:formData});
  if(!res.ok){
    const err=new Error('Cloudinary 업로드 실패: '+res.statusText);
    err.status=res.status;
    throw err;
  }
  const data=await res.json();
  return data.secure_url;
}
async function uploadToCloudinary(blob,folder,onRetry){
  const maxRetries=2;
  for(let attempt=0;attempt<=maxRetries;attempt++){
    try{
      return await uploadToCloudinaryOnce(blob,folder);
    }catch(e){
      // 4xx(잘못된 preset/폴더 등 클라이언트 설정 문제)는 재시도해도 계속 실패하므로 바로 던진다
      const isClientError=e.status&&e.status>=400&&e.status<500;
      if(isClientError||attempt===maxRetries)throw e;
      const delay=800*Math.pow(2,attempt); // 800ms → 1600ms
      onRetry?.(attempt+1,maxRetries);
      await sleep(delay);
    }
  }
}
async function uploadPhotoFile(idx,file){
  const d=items[idx];if(!d||!currentProject||!file)return;
  showToast('사진 압축 중...','');
  let upload=file;
  try{upload=await compressImage(file);}catch{}
  const kb=Math.round(upload.size/1024);
  showToast(`업로드 중... (${kb}KB)`,'');
  try{
    const url=await uploadToCloudinary(upload,`${currentProject.id}/${d.id}`,
      (attempt,max)=>showToast(`업로드 재시도 중... (${attempt}/${max})`,''));
    const [photo]=await SupabaseUtil.insert('hydmap_photos',{item_id:d.id,inspection_id:currentProject.id,url,caption:''});
    if(!photoMap[d.id])photoMap[d.id]=[];
    photoMap[d.id].push(photo);
    renderPhotoGrid(idx,photoMap[d.id]);
    showToast(`사진 저장됨 (${kb}KB)`,'ok');
  }catch(e){showToast('업로드 실패: '+e.message,'err');console.error('uploadPhoto error:',e);}
}

// ━━ 잘못된 위치 수정 (지도를 클릭해 새 위치 지정) ━━
// 위치 수정 중에는 수정 대상 마커만 남기고 나머지는 숨겨서 헷갈리지 않게 한다
function setOtherMarkersHidden(exceptIdx,hidden){

      o.overlay?.setMap(kakaoMap);
      if(labelsOn)o.labelOverlay?.setMap(kakaoMap);
    }
  });
}

// 좌표 → 주소 역지오코딩 (지도를 클릭했을 때 그 지점의 주소를 함께 받아오기 위함)
async function reverseGeocode(lat,lng){
  try{
    const r=await fetch(`https://dapi.kakao.com/v2/local/geo/coord2address.json?x=${lng}&y=${lat}`,{headers:{Authorization:'KakaoAK '+REST_KEY}});
    if(r.ok){
      const data=await r.json();
      const doc=data.documents?.[0];
      if(doc)return doc.road_address?.address_name||doc.address?.address_name||null;
    }
  }catch{}
  return null;
}
async function applyFixLocation(idx,latLng){
  const d=items[idx];if(!d)return;
  fixLocationIdx=-1;
  kakaoMap.setCursor('');
  const lat=latLng.getLat(),lng=latLng.getLng();
  try{
    showToast('주소 확인 중...','');
    const addr=await reverseGeocode(lat,lng);
    const payload={lat,lng,loc_fixed_at:new Date().toISOString()};
    if(addr)payload.address=addr;
    await SupabaseUtil.update('hydmap_items',payload,{id:d.id});
    d.lat=lat;d.lng=lng;d.loc_fixed_at=payload.loc_fixed_at;
    if(addr)d.address=addr;
    // 기존 오버레이/클러스터 마커 위치 이동 (재생성 없이 좌표만 갱신)
    const o=overlays[idx];
    if(o){
      const newPos=new kakao.maps.LatLng(lat,lng);
      o.overlay?.setPosition(newPos);
      o.labelOverlay?.setPosition(newPos);
      o.iw?.setPosition(newPos);
      o.clMarker?.setPosition(newPos);
    }else{
      // 좌표가 없어서 마커가 아예 없던 항목이면 새로 생성
      addMarker(idx,d);
      if(clusterer)clusterer.redraw();
    }
    hyReRender(idx);
    updateListItem(idx);
    setOtherMarkersHidden(idx,false);
    showToast(addr?'✅ 위치·주소가 함께 수정되었습니다':'✅ 위치가 수정되었습니다 (주소 확인 실패)','ok');
  }catch(e){
    setOtherMarkersHidden(idx,false);
    showToast('위치 수정 실패: '+(e?.message||''),'err');
  }
}
