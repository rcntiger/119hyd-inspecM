function closeIw(){if(iwOpen){iwOpen.setMap(null);iwOpen=null;}if(activeMarkerEl){activeMarkerEl.classList.remove('active-mk');activeMarkerEl=null;}}
function fitAll(){
  if(!kakaoMap)return;
  // 그룹/검색 필터로 숨겨진 항목은 제외하고, 현재 화면에 보이는 대상만 기준으로 범위를 잡는다
  const visible=items.filter(d=>d.lat&&d.lng&&!isHidden(d));
  const pts=visible.length?visible:items.filter(d=>d.lat&&d.lng); // 필터 결과가 하나도 없으면 전체로 폴백
  if(!pts.length)return;
  // 좌표 이상치(잘못된 지오코딩으로 엉뚱하게 먼 지역에 찍힌 점) 때문에
  // 지도가 전국 단위로 확 축소되는 문제를 막기 위해, 중앙값에서 너무 먼 점은 제외하고 범위를 계산
  const lats=pts.map(d=>d.lat).slice().sort((a,b)=>a-b);
  const lngs=pts.map(d=>d.lng).slice().sort((a,b)=>a-b);
  const medLat=lats[Math.floor(lats.length/2)];
  const medLng=lngs[Math.floor(lngs.length/2)];
  const MAX_DEG=0.3; // 약 30km 이내까지는 정상 범위로 간주
  const normal=pts.filter(d=>Math.abs(d.lat-medLat)<MAX_DEG&&Math.abs(d.lng-medLng)<MAX_DEG);
  const useSet=normal.length?normal:pts; // 전부 이상치로 걸러지면 원래대로 전체 사용
  const bounds=new kakao.maps.LatLngBounds();
  useSet.forEach(d=>bounds.extend(new kakao.maps.LatLng(d.lat,d.lng)));
  if(!bounds.isEmpty())kakaoMap.setBounds(bounds,50);
  // 안전장치: 그래도 너무 축소되면 레벨을 다시 당겨온다 (처음 진입 시 좀 더 확대된 느낌으로 시작)
  if(kakaoMap.getLevel()>5)kakaoMap.setLevel(5);
  // setBounds는 "최소~최대 좌표의 중간점"을 중심으로 잡아서, 외곽에 몇 개만 떨어져 있으면
  // 정작 밀집된 무리가 한쪽으로 쏠려 보이는 문제가 있다. 밀집 지역의 중앙값으로 다시 센터를 맞춘다.
  kakaoMap.setCenter(new kakao.maps.LatLng(medLat,medLng));
}

/* ══════════ Excel 업로드 / 컬럼 재설정 (공통 ExcelUtil.createReader 사용) ══════════ */
let excelReader=null;
let _excelMode='upload';     // 'upload' | 'reset'
let _excelOrigFile=null;     // 업로드 모드에서 Storage에 원본 저장할 File
let _resetOpts={delDone:false,delMemo:false,delPhotos:false};

function getExcelReader(){
  if(excelReader)return excelReader;
  excelReader=ExcelUtil.createReader({
    columns:[
      {id:'name',label:'이름',required:true,keywords:['이름','명칭','건물','시설','대상','name','번호','용수']},
      {id:'addr',label:'주소',required:true,keywords:['주소','도로','지번','위치','addr']},
      {id:'lat',label:'위도',keywords:['위도','lat','latitude','y좌표']},
      {id:'lng',label:'경도',keywords:['경도','lng','lon','longitude','x좌표']},
      {id:'team',label:'팀',keywords:['팀','team','부서']},
      {id:'group',label:'조',keywords:['조','반','구역','그룹','group']},
      {id:'type',label:'소화전 종류(식구분)',keywords:['식구분','종류','구분','소화전종류','형식']},
      {id:'extra',label:'추가정보',keywords:['비고','추가','기타','결과','검수','extra']},
    ],
    defaultHeaderRow:1,
    storageKey:'hydmap', // 새 excel.js의 앱별 컬럼 설정 저장 키 (work-div 등 다른 앱과 localStorage 분리)
    confirmLabel:'확인',
    onConfirm:(headers,rows,mapping)=>_onExcelConfirm(headers,rows,mapping),
  });
  return excelReader;
}

// ━━ 공통 확인 핸들러 (업로드/재설정 분기) ━━
async function _onExcelConfirm(headers,rows,mapping){
  // 매핑 인덱스 해석기: 구버전 excel.js는 mapping.name처럼 컬럼 id를 키로 쓰지만,
  // 신버전(동적 컬럼 지원)은 정규화된 내부 키(col._id)로 넘겨줄 수 있다.
  // 두 구조 모두에서 "이 컬럼이 시트의 몇 번째 열인지"를 얻는다.
  const _mi=id=>{
    if(mapping[id]!=null)return mapping[id];
    if(Array.isArray(mapping._dynCols)){
      const col=mapping._dynCols.find(c=>c.id===id);
      if(col&&col._id!=null&&mapping[col._id]!=null)return mapping[col._id];
    }
    return null;
  };
  const iName=_mi('name'),iAddr=_mi('addr'),iLat=_mi('lat'),iLng=_mi('lng'),
        iTeam=_mi('team'),iGroup=_mi('group'),iType=_mi('type'),iExtra=_mi('extra');
  console.debug('excel mapping 수신:',mapping,'→ 해석:',{iName,iAddr,iLat,iLng,iTeam,iGroup,iType,iExtra});
  if(iName==null){
    showToast('이름 컬럼이 매핑되지 않았습니다. 컬럼 설정을 확인해주세요.','err');
    return;
  }
  const parsed=rows.map(r=>{
    const typeRaw=iType!=null?String(r[iType]||'').trim():'';
    // 119hyd-inspec.html과 동일한 판별 규칙: "지상" 포함 또는 '1'/'G' → 지상식, 그 외(값이 있으면) 지하식
    const hydrantType=typeRaw?(/지상|^1$|^G$/i.test(typeRaw)?'ground':'underground'):null;
    const extraObj={};
    // ⚠ 매핑값은 컬럼명이 아니라 "몇 번째 열인지"를 가리키는 인덱스 숫자다.
    //    그래서 실제 헤더 텍스트(headers[iExtra])를 키로 써야 "도색년월일: 2012-06-12"처럼 나온다.
    if(iExtra!=null){
      const colName=headers[iExtra]||'정보';
      extraObj[colName]=String(r[iExtra]||'').trim();
    }
    // 새 excel.js: 모달에서 사용자가 직접 추가한 커스텀 컬럼(mapping._dynCols)도 extra에 수집한다.
    // 정보카드는 extra의 모든 키-값을 동적으로 표시하므로, 컬럼이 늘어나면 카드 표시도 자동으로 늘어난다.
    // 구버전 excel.js(_dynCols 없음)에서도 그대로 동작하도록 방어적으로 처리.
    if(Array.isArray(mapping._dynCols)){
      const baseIds=new Set(['name','addr','lat','lng','team','group','type','extra']);
      mapping._dynCols.forEach(col=>{
        if(baseIds.has(col.id))return; // 기본 컬럼은 위에서 이미 처리됨
        const colIdx=mapping[col._id]??mapping[col.id];
        if(colIdx==null)return; // 시트 컬럼과 매핑 안 된 항목은 건너뜀
        const val=String(r[colIdx]||'').trim();
        if(val)extraObj[col.label||headers[colIdx]||'정보']=val;
      });
    }
    if(hydrantType)extraObj._type=hydrantType;
    // 엑셀에 위도/경도 컬럼이 매핑되어 있으면 그 값을 바로 사용 (지오코딩보다 정확함).
    // 값이 없거나 숫자가 아니면 null로 두고, 이후 업로드 단계에서 주소로 지오코딩해서 채운다.
    let excelLat=null,excelLng=null;
    if(iLat!=null){const v=parseFloat(r[iLat]);if(!isNaN(v)&&v>=-90&&v<=90)excelLat=v;}
    if(iLng!=null){const v=parseFloat(r[iLng]);if(!isNaN(v)&&v>=-180&&v<=180)excelLng=v;}
    // 팀/조 결합: 두 컬럼("1팀"+"2조" 또는 "1"+"2")을 "1팀 2조" 형태로 합쳐 group_name에 저장.
    // 값이 숫자만 있으면 팀/조 접미어를 자동으로 붙인다. 조만 있거나 팀만 있으면 있는 것만 쓴다.
    let teamVal=iTeam!=null?String(r[iTeam]||'').trim():'';
    let joVal=iGroup!=null?String(r[iGroup]||'').trim():'';
    if(teamVal&&/^\d+$/.test(teamVal))teamVal+='팀';
    if(joVal&&/^\d+$/.test(joVal))joVal+='조';
    const groupName=[teamVal,joVal].filter(Boolean).join(' ')||null;
    return{
      name:String(iName!=null?r[iName]:'').replace(/^\s+|\s+$/g,'').replace(/\s+/g,' '),
      address:String(iAddr!=null?r[iAddr]:'').replace(/^\s+|\s+$/g,'').replace(/\s+/g,' '),
      group_name:groupName,
      extra:Object.keys(extraObj).length?extraObj:null,
      lat:(excelLat&&excelLng)?excelLat:null,
      lng:(excelLat&&excelLng)?excelLng:null,
    };
  }).filter(d=>d.name);

  if(!parsed.length){showToast('가져올 행이 없습니다','err');return;}

  if(_excelMode==='reset'){
    await _runReset(parsed);
  }else{
    await _runUpload(parsed);
  }
}

// 지오코딩 + DB 삽입을 3개씩 병렬 배치로 처리 (완전 순차 대비 약 3배 빠름).
// 카카오 로컬 API 쿼터를 고려해 동시 3개로 제한하고, 배치 사이에 짧게 쉰다.
const GEOCODE_BATCH_SIZE=3;
async function _insertParsedItems(parsed,pid,verb){
  let done=0,ok=0;
  const errors=[]; // {name, message} 수집 — 지금까지 catch{}로 완전히 숨겨져서 원인을 알 수 없었음
  for(let i=0;i<parsed.length;i+=GEOCODE_BATCH_SIZE){
    const batch=parsed.slice(i,i+GEOCODE_BATCH_SIZE);
    await Promise.all(batch.map(async d=>{
      let lat=d.lat,lng=d.lng;
      // 엑셀에 이미 유효한 위도/경도가 있으면 지오코딩을 건너뛴다 (더 정확하고 더 빠름)
      if(!(lat&&lng)){
        try{const geo=await geocodeAddr(d.address);if(geo){lat=geo.lat;lng=geo.lng;}}catch{}
      }
      try{
        await SupabaseUtil.insert('hydmap_items',{inspection_id:pid,name:d.name,address:d.address,group_name:d.group_name||null,lat,lng,extra:d.extra||null});
        ok++;
      }catch(e){
        console.error(`[업로드 실패] ${d.name}:`,e);
        errors.push({name:d.name,message:e?.message||String(e)});
      }
      done++;
      showToast(`(${done}/${parsed.length}) ${verb} 중...`,'');
    }));
    await sleep(60);
  }
  if(errors.length){
    console.error(`총 ${errors.length}건 삽입 실패:`,errors);
    // 첫 실패 건의 실제 원인을 화면에 노출 (RLS/컬럼명/제약조건 오류 등을 바로 확인할 수 있도록)
    showToast(`⚠ ${errors.length}건 저장 실패 — 예: "${errors[0].name}": ${errors[0].message}`,'err');
  }
  return ok;
}

async function _runUpload(parsed){
  const pid=currentProject.id;
  let origSaveErr=null;
  // 원본 파일 Storage에 저장
  if(_excelOrigFile&&currentProject){
    try{
      const path=`${pid}/original.${_excelOrigFile.name.split('.').pop()||'xlsx'}`;
      await SupabaseUtil.uploadFile('hydmap-files',path,_excelOrigFile);
    }catch(e){
      console.error('원본 파일 저장 실패:',e);
      origSaveErr=e?.message||'알 수 없는 오류';
    }
  }

  // 기존 데이터가 있으면 새 엑셀로 완전히 교체 (중복 생성 방지)
  if(items.length>0){
    try{
      showToast('기존 데이터 삭제 중...','');
      await SupabaseUtil.remove('hydmap_photos',{inspection_id:pid});
      await SupabaseUtil.remove('hydmap_memo',{inspection_id:pid});
      await SupabaseUtil.remove('hydmap_done',{inspection_id:pid});
      await SupabaseUtil.remove('hydmap_records',{inspection_id:pid});
      await SupabaseUtil.remove('hydmap_items',{inspection_id:pid});
    }catch(e){showToast('기존 데이터 삭제 실패: '+e.message,'err');return;}
  }

  const ok=await _insertParsedItems(parsed,pid,'업로드');
  if(origSaveErr){
    showToast(`${ok}/${parsed.length}개 업로드 완료 (⚠ 원본 백업 실패: ${origSaveErr})`,'err');
  }else{
    showToast(`${ok}/${parsed.length}개 업로드 완료`,'ok');
  }
  await loadProjectData();
}

async function _runReset(parsed){
  const pid=currentProject.id;
  const {delDone,delMemo,delPhotos}=_resetOpts;
  try{
    // 새로 선택한 원본 파일을 Storage에 백업 (실패해도 재설정 자체는 계속 진행)
    if(_excelOrigFile){
      try{
        const path=`${pid}/original.${_excelOrigFile.name.split('.').pop()||'xlsx'}`;
        await SupabaseUtil.uploadFile('hydmap-files',path,_excelOrigFile);
      }catch(e){console.warn('원본 파일 백업 저장 실패 (재설정은 계속 진행됨)',e);}
    }
    if(delPhotos){
      showToast('사진 기록 삭제 중...','');
      // 사진은 Cloudinary에 저장되므로 DB 기록만 삭제 (Cloudinary 원본은 남음)
      await SupabaseUtil.remove('hydmap_photos',{inspection_id:pid});
    }
    if(delMemo){showToast('메모 삭제 중...','');await SupabaseUtil.remove('hydmap_memo',{inspection_id:pid});}
    if(delDone){showToast('완료 기록 삭제 중...','');await SupabaseUtil.remove('hydmap_done',{inspection_id:pid});}

    showToast('기존 항목 삭제 중...','');
    await SupabaseUtil.remove('hydmap_items',{inspection_id:pid});

    const ok=await _insertParsedItems(parsed,pid,'재설정');
    showToast(`✅ 재설정 완료 (${ok}/${parsed.length}개)`,'ok');
    await loadProjectData();
  }catch(e){
    showToast('재설정 실패: '+e.message,'err');
  }
}

// 주소에 시/도/구 등 지역명이 포함되어 있는지 확인
function addrHasRegion(addr){
  return /(특별시|광역시|[가-힣]+도\s|[가-힣]+시\s|[가-힣]+군\s|[가-힣]+구\s)/.test(addr);
}
// "독산로85길 40 주건축물" 같은 문자열에서 도로명주소 핵심부(~로/~길 + 건물번호)만 추출.
// 엑셀에 섞여 들어온 건물명/용도 등 뒤에 붙은 군더더기를 잘라내기 위함 (119hyd-inspec과 동일 로직)
function extractCoreRoadAddress(addr){
  const m=addr.match(/^(.*(?:로|길))\s*(\d+(?:-\d+)?)/);
  if(!m)return null;
  const core=`${m[1]} ${m[2]}`.trim();
  return core===addr.trim()?null:core;
}
async function kakaoAddrSearch(q){
  try{
    const r=await fetch(`https://dapi.kakao.com/v2/local/search/address.json?query=${encodeURIComponent(q)}&size=1`,{headers:{Authorization:'KakaoAK '+REST_KEY}});
    if(r.ok){const d=await r.json();if(d.documents?.[0])return{lat:+d.documents[0].y,lng:+d.documents[0].x};}
  }catch{}
  return null;
}
async function kakaoKeywordSearch(q){
  try{
    const r=await fetch(`https://dapi.kakao.com/v2/local/search/keyword.json?query=${encodeURIComponent(q)}&size=1`,{headers:{Authorization:'KakaoAK '+REST_KEY}});
    if(r.ok){const d=await r.json();if(d.documents?.[0])return{lat:+d.documents[0].y,lng:+d.documents[0].x};}
  }catch{}
  return null;
}
// 카카오가 다 실패했을 때 최종 폴백 (OpenStreetMap 지오코딩, 무료/무인증)
async function nominatimSearch(q){
  try{
    const r=await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q)}&format=json&countrycodes=kr&limit=1&accept-language=ko`,{headers:{'Accept-Language':'ko'}});
    if(r.ok){const arr=await r.json();if(arr?.[0])return{lat:+arr[0].lat,lng:+arr[0].lon};}
  }catch{}
  return null;
}
async function geocodeAddr(addr){
  if(!addr)return null;
  const REGION_PREFIX='서울특별시'; // 특정 구로 고정하면 다른 구 프로젝트에서 엉뚱한 구가 붙을 수 있어 시 단위까지만 보완
  // 1) 원본 주소 그대로 검색
  let geo=await kakaoAddrSearch(addr);
  if(geo)return geo;
  // 2) 핵심 도로명주소만 추출해서 재시도 (건물명/용도 등 군더더기 제거)
  const cleaned=extractCoreRoadAddress(addr);
  if(cleaned){
    geo=await kakaoAddrSearch(cleaned);
    if(geo)return geo;
  }
  // 3) 지역명(시/도/구)이 빠져있으면 기본 지역명을 붙여서 재시도
  const base=cleaned||addr;
  if(!addrHasRegion(base)){
    geo=await kakaoAddrSearch(`${REGION_PREFIX} ${base}`);
    if(geo)return geo;
  }
  // 4) 키워드 검색 폴백
  geo=await kakaoKeywordSearch(addrHasRegion(addr)?addr:`${REGION_PREFIX} ${addr}`);
  if(geo)return geo;
  // 5) 카카오가 다 실패하면 Nominatim(OpenStreetMap)으로 마지막 시도
  geo=await nominatimSearch(addrHasRegion(base)?base:`${REGION_PREFIX} ${base}`);
  if(geo)return geo;
  await sleep(80);
  return null;
}

async function exportExcel(){

      '수정여부':rec?'✏️ 수정됨':'',
      '이름':d.name,'주소':d.address||'','그룹':d.group_name||'',
      '소화전종류':typeLabel[rec?.hydrant_type]||'',
      '도색상태':yesMidNo[rec?.paint]||'',
      '보온상태':insulLabel[rec?.insul]||'',
      '보호틀':protectLabel[rec?.protect]||'',
      '노면표시':rec?.roadmark||'',
      '사용가부':rec?.result||'',
      '고장내용':rec?.defect_detail||'',
      '점검자':rec?.insp_name||'',
      '점검(입력)일':rec?.insp_date||'',
      '점검완료':doneMap[d.id]?'○':'',
      '완료체크일자':doneMap[d.id]?.done_at?new Date(doneMap[d.id].done_at).toLocaleDateString('ko-KR'):'',
      '메모':memoMap[d.id]||'',
      '사진수':(photoMap[d.id]?.length)||0,
    };
  });
  const doneRows=allRows.filter((_,i)=>!!doneMap[items[i].id]);
  const undoneRows=allRows.filter((_,i)=>!doneMap[items[i].id]);
  const modifiedRows=allRows.filter((_,i)=>!!hydrantMap[items[i].id]);
  await ExcelUtil.download([
    {name:'전체현황',rows:allRows},
    {name:'수정됨(점검입력완료)',rows:modifiedRows.length?modifiedRows:[{'안내':'점검 입력된 항목 없음'}]},
    {name:'점검완료',rows:doneRows.length?doneRows:[{'안내':'완료 없음'}]},
    {name:'미완료',rows:undoneRows.length?undoneRows:[{'안내':'미완료 없음'}]},
  ],`${currentProject?.name||'점검결과'}_${stamp}.xlsx`);
  showToast('📊 엑셀 저장 완료','ok');
}

// ━━ 원본 파일 다운로드 ━━
// ━━ 지도 검색 ━━
let srchMarkers=[];
function toggleMapSearch(){
  const w=document.getElementById('mapSearch');
  const btn=document.getElementById('btnSearch');
  if(w.style.display==='flex'){
    w.style.display='none';btn.classList.remove('on');
    srchMarkers.forEach(m=>m.setMap(null));srchMarkers=[];
  }else{
    // 검색 버튼 바로 아래에 나타나도록 위치 계산 (버튼이 상단 가로 툴바로 이동했으므로 고정 좌표 대신 동적으로 계산)
    const wrap=document.querySelector('.map-wrap');
    if(wrap&&btn){
      const wrapRect=wrap.getBoundingClientRect();
      const btnRect=btn.getBoundingClientRect();
      let left=btnRect.left-wrapRect.left;
      const maxLeft=wrapRect.width-244; // 검색창 너비(240)+여백 고려해 화면 밖으로 안 나가게
      if(left>maxLeft)left=Math.max(10,maxLeft);
      w.style.left=left+'px';
      w.style.top=(btnRect.bottom-wrapRect.top+6)+'px';
    }
    w.style.display='flex';btn.classList.add('on');
    setTimeout(()=>document.getElementById('mapSearchInput').focus(),50);
  }
}
function closeMapSearch(){document.getElementById('mapSearch').style.display='none';document.getElementById('btnSearch').classList.remove('on');srchMarkers.forEach(m=>m.setMap(null));srchMarkers=[];}
async function searchMap(){
  const q=document.getElementById('mapSearchInput').value.trim();if(!q){showToast('검색어를 입력하세요','err');return;}
  srchMarkers.forEach(m=>m.setMap(null));srchMarkers=[];
  const res=document.getElementById('mapSearchResults');
  res.innerHTML='<div class="sri" style="cursor:default">검색 중...</div>';res.style.display='block';
  let results=[];
  try{
    const r=await fetch(`https://dapi.kakao.com/v2/local/search/keyword.json?query=${encodeURIComponent(q)}&size=10`,{headers:{Authorization:'KakaoAK '+REST_KEY}});
    const d=await r.json();
    if(d.documents?.length)results=d.documents.map(doc=>({name:doc.place_name,addr:doc.road_address_name||doc.address_name,lat:+doc.y,lng:+doc.x}));
    else{
      const r2=await fetch(`https://dapi.kakao.com/v2/local/search/address.json?query=${encodeURIComponent(q)}&size=10`,{headers:{Authorization:'KakaoAK '+REST_KEY}});
      const d2=await r2.json();
      results=d2.documents?.map(doc=>({name:doc.address_name,addr:doc.road_address?.address_name||'',lat:+doc.y,lng:+doc.x}))||[];
    }
  }catch{}
  if(!results.length){res.innerHTML='<div class="sri" style="cursor:default;color:var(--mt)">검색 결과 없음</div>';return;}
  res.innerHTML='';
  results.forEach((r,i)=>{
    const el=document.createElement('div');el.className='sri';
    el.innerHTML=`<div class="sri-name">${i+1}. ${esc(r.name)}</div><div class="sri-addr">${esc(r.addr)}</div>`;
    el.onclick=()=>{kakaoMap.setLevel(3);kakaoMap.panTo(new kakao.maps.LatLng(r.lat,r.lng));};
    res.appendChild(el);
    const mk=document.createElement('div');mk.style.cssText='width:24px;height:24px;border-radius:50%;background:#f59e0b;border:3px solid #fff;display:flex;align-items:center;justify-content:center;color:#fff;font-size:11px;font-weight:700;box-shadow:0 2px 6px rgba(0,0,0,.5)';mk.textContent=i+1;
    const ov=new kakao.maps.CustomOverlay({position:new kakao.maps.LatLng(r.lat,r.lng),content:mk,zIndex:50});ov.setMap(kakaoMap);srchMarkers.push(ov);
  });
  if(results[0])kakaoMap.panTo(new kakao.maps.LatLng(results[0].lat,results[0].lng));
}

// ━━ 위성 ━━
function mapZoomIn(){if(kakaoMap)kakaoMap.setLevel(kakaoMap.getLevel()-1,{animate:true});}
function mapZoomOut(){if(kakaoMap)kakaoMap.setLevel(kakaoMap.getLevel()+1,{animate:true});}

/* ══════════ 현위치 ══════════ */
let _myLocMarker=null,_myLocCircle=null,_myLocWatch=null;

// 위치 수정 중 지도를 클릭(또는 현위치)하면, 그 지점에 핀을 잠깐 찍어서 보여주고
// "이 위치로 저장할까요?" 확인을 받은 뒤에만 실제로 저장한다 (실수로 엉뚱한 곳을 눌러도 되돌리기 쉽게).
let _fixPinOverlay=null;
function showFixPin(latLng){
  clearFixPin();
  const el=document.createElement('div');
  el.style.cssText='font-size:32px;line-height:1;filter:drop-shadow(0 3px 4px rgba(0,0,0,.5));animation:hy-pulse .6s ease-in-out infinite alternate;pointer-events:none';
  el.textContent='📍';
  _fixPinOverlay=new kakao.maps.CustomOverlay({position:latLng,content:el,yAnchor:1,zIndex:300});
  _fixPinOverlay.setMap(kakaoMap);
}
function clearFixPin(){
  if(_fixPinOverlay){_fixPinOverlay.setMap(null);_fixPinOverlay=null;}
}
function confirmAndApplyFixLocation(idx,latLng){
  showFixPin(latLng);
  const ok=confirm('📍 이 위치로 저장할까요?');
  if(ok){
    clearFixPin();
    applyFixLocation(idx,latLng);
  }
  // 취소하면 핀만 지우고 위치 수정 모드는 계속 유지 (다시 클릭해서 재시도 가능)
  else{
    clearFixPin();
  }
}
function toggleMyLocation(){
  // 위치 수정 모드 중이면, 일반 위치추적 대신 "현재 위치로 바로 수정"으로 동작
  if(fixLocationIdx>=0){
    const idx=fixLocationIdx;
    if(!navigator.geolocation){showToast('이 브라우저는 위치 기능을 지원하지 않습니다','err');return;}
    showToast('📡 현재 위치 확인 중...','');
    navigator.geolocation.getCurrentPosition(
      pos=>{
        const {latitude:lat,longitude:lng}=pos.coords;
        confirmAndApplyFixLocation(idx,new kakao.maps.LatLng(lat,lng));
      },
      err=>{showToast('현재 위치를 가져오지 못했습니다: '+(err?.message||''),'err');},
      {enableHighAccuracy:true,timeout:10000}
    );
    return;
  }
  const btn=document.getElementById('btnMyLoc');
  if(_myLocWatch!==null){
    // 추적 종료
    navigator.geolocation.clearWatch(_myLocWatch);
    _myLocWatch=null;
    _myLocMarker?.setMap(null);_myLocMarker=null;
    _myLocCircle?.setMap(null);_myLocCircle=null;
    btn.classList.remove('on');
    showToast('현위치 추적 종료','');
    return;
  }
  if(!navigator.geolocation){showToast('이 브라우저는 위치 기능을 지원하지 않습니다','err');return;}
  btn.textContent='⏳';
  _myLocWatch=navigator.geolocation.watchPosition(
    pos=>{
      const {latitude:lat,longitude:lng,accuracy}=pos.coords;
      const latlng=new kakao.maps.LatLng(lat,lng);
      // 마커 (파란 원형)
      if(!_myLocMarker){
        const el=document.createElement('div');
        el.style.cssText='width:16px;height:16px;border-radius:50%;background:#2563eb;border:3px solid #fff;box-shadow:0 0 0 3px rgba(37,99,235,.35)';
        _myLocMarker=new kakao.maps.CustomOverlay({position:latlng,content:el,zIndex:200});
        _myLocMarker.setMap(kakaoMap);
        kakaoMap.panTo(latlng);
      }else{
        _myLocMarker.setPosition(latlng);
      }
      // 정확도 원
      if(_myLocCircle){_myLocCircle.setMap(null);}
      _myLocCircle=new kakao.maps.Circle({
        center:latlng,radius:accuracy,
        strokeWeight:1,strokeColor:'#2563eb',strokeOpacity:.4,
        fillColor:'#2563eb',fillOpacity:.08,
      });
      _myLocCircle.setMap(kakaoMap);
      btn.textContent='📍';
      btn.classList.add('on');
    },
    err=>{
      btn.textContent='📍';
      btn.classList.remove('on');
      _myLocWatch=null;
      const msg={1:'위치 권한이 거부됐습니다',2:'위치를 가져올 수 없습니다',3:'위치 요청 시간 초과'};
      showToast(msg[err.code]||'위치 오류','err');
    },
    {enableHighAccuracy:true,timeout:10000,maximumAge:3000}
  );
}
function toggleLabelVisibility(){
  labelsOn=!labelsOn;
  const btn=document.getElementById('btnLabelToggle');
  const txt=document.getElementById('btnLabelToggleTxt');
  if(btn)btn.classList.toggle('on',labelsOn);
  if(txt)txt.textContent=labelsOn?' 이름 ON':' 이름 OFF';
  Object.values(overlays).forEach(o=>{
    if(!o.labelOverlay)return;
    o.labelOverlay.setMap((o.hidden||!labelsOn)?null:kakaoMap);
  });
}
function toggleSat(){satMode=!satMode;const btn=document.getElementById('btnSat');if(satMode){kakaoMap.setMapTypeId(kakao.maps.MapTypeId.HYBRID);btn.classList.add('on-sat');btn.innerHTML='🗺️<span class="btn-txt"> 일반</span>';}else{kakaoMap.setMapTypeId(kakao.maps.MapTypeId.ROADMAP);btn.classList.remove('on-sat');btn.innerHTML='🛰️<span class="btn-txt"> 위성</span>';}}

// ━━ 거리재기 ━━
function toggleDist(){if(!distMode&&rvMode){showToast('로드뷰를 먼저 종료하세요','err');return;}distMode=!distMode;const btn=document.getElementById('btnDist');if(distMode){btn.classList.add('on');btn.innerHTML='📏<span class="btn-txt"> 측정 중...</span>';document.getElementById('distInfo').style.display='block';document.getElementById('btnDistClear').style.display='block';kakaoMap.setCursor('crosshair');}else finishDist();}
function addDistMarker(pos){const el=document.createElement('div');el.style.cssText='width:8px;height:8px;border-radius:50%;background:#2f81f7;border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.5)';const o=new kakao.maps.CustomOverlay({position:pos,content:el,zIndex:50});o.setMap(kakaoMap);distMarkers.push(o);}
function updateDistLine(){if(distLine)distLine.setMap(null);if(distPath.length<2)return;distLine=new kakao.maps.Polyline({map:kakaoMap,path:distPath,strokeWeight:3,strokeColor:'#2f81f7',strokeOpacity:.9,strokeStyle:'solid'});const m=Math.round(distLine.getLength());document.getElementById('distVal').textContent=m>=1000?(m/1000).toFixed(2)+'km':m+'m';}
function finishDist(){distMode=false;document.getElementById('btnDist').classList.remove('on');document.getElementById('btnDist').innerHTML='📏<span class="btn-txt"> 거리재기</span>';if(kakaoMap)kakaoMap.setCursor('');}
function clearDist(){if(distLine){distLine.setMap(null);distLine=null;}distMarkers.forEach(m=>m.setMap(null));distMarkers=[];distPath=[];document.getElementById('distVal').textContent='0';document.getElementById('distInfo').style.display='none';document.getElementById('btnDistClear').style.display='none';finishDist();}

/* ══════════ RoadView ══════════ */
function setRvMode(on){rvMode=on;const btn=document.getElementById('btnRv');if(on){btn.classList.add('on-rv');btn.innerHTML='🔭<span class="btn-txt"> 위치 클릭...</span>';if(kakaoMap)kakaoMap.setCursor('crosshair');}else{btn.classList.remove('on-rv');btn.innerHTML='🔭<span class="btn-txt"> 로드뷰</span>';if(kakaoMap)kakaoMap.setCursor('');}}
function toggleRvMode(){
  if(!rvMode&&distMode){showToast('거리재기를 먼저 종료하세요','err');return;}
  setRvMode(!rvMode);
  if(rvMode)showToast('지도에서 로드뷰를 볼 위치를 클릭하세요','');
}
function openRvAt(latLng){
  document.getElementById('rvPanel').style.display='flex';
  document.getElementById('rvHint').textContent=`${latLng.getLat().toFixed(5)}, ${latLng.getLng().toFixed(5)}`;
  const tb=document.getElementById('mapToolbar');if(tb)tb.style.top='56px';
  const tbTop=document.getElementById('mapToolbarTop');if(tbTop)tbTop.style.setProperty('display','none','important');
  if(!rvInstance)rvInstance=new kakao.maps.Roadview(document.getElementById('rvMap'));
  if(!rvMinimapInst){
    rvMinimapInst=new kakao.maps.Map(document.getElementById('rvMinimapInner'),{center:latLng,level:3});
    rvOverlay=new kakao.maps.CustomOverlay({position:latLng,content:'<div style="width:14px;height:14px;border-radius:50%;background:#ef4444;border:3px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,.5)"></div>',zIndex:10});
    rvOverlay.setMap(rvMinimapInst);
    kakao.maps.event.addListener(rvInstance,'position_changed',()=>{
      const pos=rvInstance.getPosition();
      if(pos&&rvMinimapInst){rvMinimapInst.setCenter(pos);rvOverlay.setPosition(pos);}
    });
  }else{rvMinimapInst.setCenter(latLng);rvOverlay.setPosition(latLng);}
  const client=new kakao.maps.RoadviewClient();
  client.getNearestPanoId(latLng,50,panoId=>{if(panoId)rvInstance.setPanoId(panoId,latLng);else document.getElementById('rvHint').textContent='로드뷰 없음';});
}
function openRvFromPopup(latLng){lastIw=iwOpen;closeIw();openRvAt(latLng);}
function closeRv(){
  document.getElementById('rvPanel').style.display='none';setRvMode(false);
  const tb=document.getElementById('mapToolbar');if(tb)tb.style.top='190px';
  const tbTop=document.getElementById('mapToolbarTop');if(tbTop)tbTop.style.removeProperty('display');
  minimapOn=false;document.getElementById('rvMinimap').style.display='none';
  const btn=document.getElementById('btnMinimap');if(btn){btn.style.background='';btn.style.color='';}
  if(lastIw&&kakaoMap){lastIw.setMap(kakaoMap);iwOpen=lastIw;lastIw=null;}
}
function toggleMinimap(){
  minimapOn=!minimapOn;
  document.getElementById('rvMinimap').style.display=minimapOn?'block':'none';
  const btn=document.getElementById('btnMinimap');
  if(btn){btn.style.background=minimapOn?'var(--ac)':'';btn.style.color=minimapOn?'#fff':'';}
  if(minimapOn&&rvMinimapInst)setTimeout(()=>rvMinimapInst.relayout(),50);
}

// ━━ 모바일 ━━
// 모바일 "지도보기" 모드에서는 상단 헤더(뒤로/점검자/날짜/엑셀업로드 바)를 숨겨서
// 화면을 지도에 최대한 할애한다. 목록 보기로 돌아오면 다시 표시.
function updateMobHeaderVisibility(){
  const header=document.getElementById('mapHeader');
  if(!header)return;
  const isMobile=window.innerWidth<=600;
  header.style.display=(isMobile&&mobMapMode)?'none':'flex';
}
function toggleMobView(){
  mobMapMode=!mobMapMode;
  document.getElementById('sidebar').classList.toggle('map-mode',mobMapMode);
  document.getElementById('mobToggle').textContent=mobMapMode?'📋 목록 보기':'🗺️ 지도 보기';
  const backBtn=document.getElementById('backBtn');
  if(backBtn&&window.innerWidth<=600)backBtn.textContent=mobMapMode?'← 이전':'← 이전 화면';
  const isMobile=window.innerWidth<=768;
  if(isMobile){
    document.getElementById('mapToolbar').style.display=mobMapMode?'flex':'none';
    document.getElementById('mapToolbarTop').style.display=mobMapMode?'flex':'none';
    document.body.style.overflowX=mobMapMode?'':'hidden';
  }
  updateMobHeaderVisibility();
  if(mobMapMode&&kakaoMap){
    const center=kakaoMap.getCenter();
    const level=kakaoMap.getLevel();
    const restore=()=>{
      kakaoMap.relayout();
      // 마커가 있으면 마커 영역에 맞추고, 없으면 기존 위치 복원
      if(items.some(d=>d.lat&&d.lng))fitAll();
      else{kakaoMap.setCenter(center);kakaoMap.setLevel(level);}
    };
    setTimeout(restore,50);
    setTimeout(restore,250);
    setTimeout(restore,500);
  }else if(kakaoMap){
    // 목록 보기로 돌아갈 때도 헤더가 다시 나타나 지도 영역이 줄어드므로 relayout
    setTimeout(()=>kakaoMap.relayout(),50);
  }
}

function switchToMapMode(){
  if(!mobMapMode){
    mobMapMode=true;
    document.getElementById('sidebar').classList.add('map-mode');
    document.getElementById('mobToggle').textContent='📋 목록 보기';
    const backBtn=document.getElementById('backBtn');
    if(backBtn&&window.innerWidth<=600)backBtn.textContent='← 이전';
    document.getElementById('mapToolbar').style.display='flex';
    document.getElementById('mapToolbarTop').style.display='flex';
    document.body.style.overflowX='';
    updateMobHeaderVisibility();
    if(kakaoMap){
      const center=kakaoMap.getCenter();
      const level=kakaoMap.getLevel();
      setTimeout(()=>{kakaoMap.relayout();kakaoMap.setCenter(center);kakaoMap.setLevel(level);},50);
      setTimeout(()=>{kakaoMap.relayout();kakaoMap.setCenter(center);kakaoMap.setLevel(level);},200);
      setTimeout(()=>{kakaoMap.relayout();kakaoMap.setCenter(center);kakaoMap.setLevel(level);},500);
    }
  }
}

// 키보드
window.addEventListener('keydown',e=>{
  if(e.key==='Escape'){
    if(document.getElementById('rvPanel').style.display!=='none'){closeRv();return;}
    if(rvMode){setRvMode(false);return;}
    if(distMode){finishDist();return;}
    if(fixLocationIdx>=0){startFixLocation(fixLocationIdx);return;}
    closeIw();
  }
});
